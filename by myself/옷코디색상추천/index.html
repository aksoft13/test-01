const TONE_IDX = { light: 0, mid: 1, dark: 2 };
const TONES = ['light', 'mid', 'dark'];
const PAIR_FAMILIES = {
  neutral: ['blue', 'earth', 'khaki', 'neutral'],
  blue:    ['neutral', 'earth', 'blue'],
  earth:   ['neutral', 'earth', 'khaki'],
  khaki:   ['earth', 'neutral', 'khaki'],

};

// ── 색상 유틸 ─────────────────────────────────────────────────
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function shade(hex, d) {
  if (!hex || !hex.startsWith('#')) return hex || 'transparent';
  const [r,g,b] = hexToRgb(hex);
  const c = v => Math.min(255, Math.max(0, v + d));
  return `rgb(${c(r)},${c(g)},${c(b)})`;
}
function colorDist(h1, h2) {
  const [r1,g1,b1] = hexToRgb(h1), [r2,g2,b2] = hexToRgb(h2);
  return Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2);
}
function closestColor(hex) {
  return COLORS.reduce((best,c) => { const d=colorDist(hex,c.hex); return d<best.d?{c,d}:best; }, {c:COLORS[0],d:Infinity}).c;
}

// ── 추천 로직 ─────────────────────────────────────────────────
function toneInToneRec(fixedParts) {
  const fixedEntries = PARTS.filter(p=>fixedParts[p]).map(p=>[p,fixedParts[p]]);
  if (!fixedEntries.length) return [];
  const baseTone = byId(fixedEntries[0][1]).tone;
  const fixedIds = new Set(fixedEntries.map(([,id])=>id));
  const fixedFamilies = new Set(fixedEntries.map(([,id])=>byId(id).family));
  const unfixed = PARTS.filter(p=>!fixedParts[p]);
  const pool = COLORS.filter(c=>c.tone===baseTone&&!fixedIds.has(c.id))
    .sort((a,b)=>(fixedFamilies.has(a.family)?1:0)-(fixedFamilies.has(b.family)?1:0));
  const results=[], seen=new Set();
  for (let v=0; v<pool.length&&results.length<3; v++) {
    const outfit={...fixedParts};
    const usedIds=new Set(fixedIds), usedFam=new Set(fixedFamilies);
    let valid=true;
    for (const part of unfixed) {
      let pick=null;
      for (let i=v; i<pool.length+v; i++) {
        const c=pool[i%pool.length];
        if (!usedIds.has(c.id)&&!usedFam.has(c.family)) { pick=c; break; }
      }
      if (!pick) for (const c of pool) { if (!usedIds.has(c.id)) { pick=c; break; } }
      if (!pick) { valid=false; break; }
      outfit[part]=pick.id; usedIds.add(pick.id); usedFam.add(pick.family);
    }
    const key=PARTS.map(p=>outfit[p]).join(',');
    if (valid&&!seen.has(key)) { results.push(outfit); seen.add(key); }
  }
  return results;
}

function toneOnToneRec(fixedParts) {
  const fixedEntries = PARTS.filter(p=>fixedParts[p]).map(p=>[p,fixedParts[p]]);
  if (!fixedEntries.length) return [];
  const baseColor = byId(fixedEntries[0][1]);
  const pairFams = PAIR_FAMILIES[baseColor.family]||['neutral'];
  const toneIdx = TONE_IDX[baseColor.tone];
  const unfixed = PARTS.filter(p=>!fixedParts[p]);
  return Array.from({length:3},(_,v)=>{
    const outfit={...fixedParts};
    const usedIds=new Set(PARTS.filter(p=>fixedParts[p]).map(p=>fixedParts[p]));
    unfixed.forEach((part,i)=>{
      const targetTone=TONES[(toneIdx+i+1)%3];
      const fam=pairFams[(v+i)%pairFams.length];
      const pick=COLORS.find(c=>c.family===fam&&c.tone===targetTone&&!usedIds.has(c.id))
        ||COLORS.find(c=>c.tone===targetTone&&!usedIds.has(c.id))
        ||COLORS.find(c=>!usedIds.has(c.id));
      if (pick) { outfit[part]=pick.id; usedIds.add(pick.id); }
    });
    return outfit;
  });
}

function pinterestRec(fixedParts) {
  const fixedEntries = PARTS.filter(p=>fixedParts[p]).map(p=>[p,fixedParts[p]]);
  if (!fixedEntries.length) return [];
  return CURATED
    .map(combo=>{
      let score=0;
      for (const [part,colorId] of fixedEntries) {
        if (combo[part]===colorId) score+=10;
        else if (byId(combo[part])?.family===byId(colorId)?.family) score+=4;
        else if (byId(combo[part])?.tone===byId(colorId)?.tone) score+=2;
      }
      return {combo,score};
    })
    .filter(s=>{
      if (!s.score) return false;
      const vals=PARTS.map(p=>s.combo[p]);
      return new Set(vals).size===vals.length;
    })
    .sort((a,b)=>b.score-a.score)
    .slice(0,3)
    .map(({combo})=>({
      outfit:{top:combo.top,bottom:combo.bottom,outer:combo.outer,shoes:combo.shoes},
      name:combo.name, style:combo.style,
    }));
}

      <path d="M35,88 L37,88 L40,126 L30,126 L32,88 Z" fill={bc||EMPTY}/>
      {/* 터틀넥 (재킷 위아래 노출) */}
      <rect x="25" y="33" width="10" height="20" rx="2" fill={tc||EMPTY}/>
      <rect x="25" y="86" width="10" height="10" fill={tc||EMPTY}/>
      {/* 라이더 재킷 (짧은 기장) */}
      <path d="M25,40 L7,46 L6,88 L27,88 L25,40 Z" fill={oc||EMPTY}/>
      <path d="M35,40 L53,46 L54,88 L33,88 L35,40 Z" fill={oc||EMPTY}/>
      {/* 재킷 명암 */}
      <path d="M25,40 L23,88 L27,88 Z" fill={shade(oc||EMPTY,-22)} opacity="0.25"/>
      <path d="M35,40 L37,88 L33,88 Z" fill={shade(oc||EMPTY,-22)} opacity="0.25"/>
      {/* 비대칭 지퍼라인 */}
      <line x1="30" y1="42" x2="28" y2="87" stroke={shade(oc||EMPTY,-50)} strokeWidth="1.1" opacity="0.7"/>
      <circle cx="28" cy="87" r="1.2" fill={shade(oc||EMPTY,-40)} opacity="0.8"/>
      {/* 칼라 */}
      <path d="M26,42 L30,38 L34,42" fill="none" stroke={shade(oc||EMPTY,-30)} strokeWidth="1.2" opacity="0.8"/>
      {/* 밑단선 */}
      <line x1="6" y1="88" x2="54" y2="88" stroke={shade(oc||EMPTY,-35)} strokeWidth="0.7" opacity="0.4"/>
      <Head/>
    </svg>
  );
}

const STYLE_COMPONENTS = { coat: StyleCoat, vest: StyleVest, cpo: StyleCPO, rider: StyleRider };

function StyleFigures({ outfit, height = 130 }) {
  const oc = outfit.outer  ? byId(outfit.outer)?.hex  : null;
  const tc = outfit.top    ? byId(outfit.top)?.hex    : null;
  const bc = outfit.bottom ? byId(outfit.bottom)?.hex : null;
  const sc = outfit.shoes  ? byId(outfit.shoes)?.hex  : null;
  const props = { oc, tc, bc, sc };

  return (
    <div style={{ display:'flex', gap:4 }}>
      {STYLES.map(s => {
        const Comp = STYLE_COMPONENTS[s.id];
        return (
          <div key={s.id} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
            <div style={{ width:'100%' }}>
              <Comp {...props}/>
            </div>
            <span style={{ fontSize:9, color:'#555', whiteSpace:'nowrap' }}>{s.label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────
function App() {
  const [fixed, setFixed] = useState({ top:null, bottom:null, outer:null, shoes:null });
  const [activePart, setActivePart] = useState('top');
  const [tab, setTab] = useState('tit');
  const [showPicker, setShowPicker] = useState(false);
  const [pickerHex, setPickerHex] = useState('#888888');

  const hasFixed = Object.values(fixed).some(Boolean);

  const recs = useMemo(() => {
    if (!hasFixed) return null;
    return {
      tit: toneInToneRec(fixed),
      tot: toneOnToneRec(fixed),
      pin: pinterestRec(fixed),
    };
  }, [fixed, hasFixed]);

  const selectColor = useCallback(id => {
    setFixed(prev => ({ ...prev, [activePart]: prev[activePart]===id ? null : id }));
  }, [activePart]);

  const reset = () => setFixed({ top:null, bottom:null, outer:null, shoes:null });

  const handlePickerChange = e => {
    const hex = e.target.value;
    setPickerHex(hex);
    setFixed(prev => ({ ...prev, [activePart]: closestColor(hex).id }));
  };

  const currentRecs = recs
    ? (tab==='tit' ? recs.tit : tab==='tot' ? recs.tot : recs.pin)
    : [];

  return (
    <div style={{ maxWidth:430, margin:'0 auto', minHeight:'100vh', paddingBottom:60 }}>

      {/* Header */}
      <div style={{ padding:'48px 20px 12px', display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
        <div>
          <div style={{ fontSize:22, fontWeight:700, letterSpacing:-0.5 }}>오늘의 코디</div>
          <div style={{ fontSize:13, color:'#555', marginTop:3 }}>색상을 고르면 나머지를 맞춰드려요</div>
        </div>
        {hasFixed && (
          <button onClick={reset} style={{ fontSize:12, color:'#555', background:'none', border:'none', cursor:'pointer' }}>
            초기화
          </button>
        )}
      </div>

      {/* 메인 미리보기 — 현재 선택 색상 적용한 4가지 스타일 */}
      <div style={{ padding:'4px 20px 12px' }}>
        <StyleFigures outfit={fixed} height={130}/>
      </div>

      {/* 부위 선택 */}
      <div style={{ display:'flex', gap:6, padding:'0 20px 14px' }}>
        {PARTS.map(part => {
          const color = fixed[part] ? byId(fixed[part]) : null;
          const isActive = activePart===part;
          return (
            <button key={part} onClick={()=>setActivePart(part)} style={{
              flex:1, padding:'8px 4px', borderRadius:12, border:'none',
              background: isActive ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.04)',
              outline: isActive ? '1.5px solid rgba(255,255,255,0.22)' : '1.5px solid transparent',
              cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:5,
              transition:'all 0.15s',
            }}>
              <div style={{
                width:30, height:30, borderRadius:8,
                background: color ? color.hex : '#252525',
                border:'1px solid rgba(255,255,255,0.07)',
                display:'flex', alignItems:'center', justifyContent:'center',
              }}>
                {!color && <span style={{ fontSize:14, opacity:0.2 }}>+</span>}
              </div>
              <span style={{ fontSize:11, color: isActive ? '#bbb' : '#444' }}>{PART_META[part]}</span>
              {color && <span style={{ fontSize:9, color:'#555' }}>{color.name}</span>}
            </button>
          );
        })}
      </div>

      {/* 색상 팔레트 */}
      <div style={{ padding:'0 20px 18px' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
          <span style={{ fontSize:13, color:'#555' }}>{PART_META[activePart]} 색상 선택</span>
          <button onClick={()=>setShowPicker(p=>!p)} style={{
            fontSize:12, color: showPicker ? '#bbb' : '#666',
            background: showPicker ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.07)',
            border:'none', borderRadius:20, padding:'4px 12px', cursor:'pointer',
          }}>직접 선택</button>
        </div>
        {showPicker && (
          <div style={{
            marginBottom:12, display:'flex', alignItems:'center', gap:12,
            padding:'10px 14px', background:'rgba(255,255,255,0.05)', borderRadius:12,
          }}>
            <input type="color" value={pickerHex} onChange={handlePickerChange}
              style={{ width:36, height:36, border:'none', borderRadius:8, cursor:'pointer', padding:0, background:'none' }}/>
            <div>
              <div style={{ fontSize:13, color:'#bbb' }}>{pickerHex}</div>
              <div style={{ fontSize:11, color:'#555', marginTop:2 }}>가장 가까운 팔레트 색상으로 자동 매핑</div>
            </div>
          </div>
        )}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(8, 1fr)', gap:8 }}>
          {COLORS.map(color => {
            const sel = fixed[activePart]===color.id;
            return (
              <button key={color.id} onClick={()=>selectColor(color.id)} title={color.name} style={{
                width:'100%', aspectRatio:'1', borderRadius:'50%', border:'none',
                background:color.hex,
                outline: sel ? '2.5px solid white' : '2px solid rgba(255,255,255,0.06)',
                outlineOffset: sel ? '2px' : '0px',
                cursor:'pointer',
                transform: sel ? 'scale(1.15)' : 'scale(1)',
                transition:'transform 0.15s',
              }}/>
            );
          })}
        </div>
      </div>

      {/* 구분선 */}
      {recs && <div style={{ height:1, background:'rgba(255,255,255,0.06)', margin:'0 20px 16px' }}/>}

      {/* 추천 섹션 */}
      {recs && (
        <div style={{ padding:'0 20px' }}>
          <div style={{ display:'flex', gap:6, marginBottom:12 }}>
            {[['tit','톤인톤'],['tot','톤온톤'],['pin','추천조합']].map(([id,label])=>(
              <button key={id} onClick={()=>setTab(id)} style={{
                flex:1, padding:'9px 0', borderRadius:12, border:'none',
                background: tab===id ? 'white' : 'rgba(255,255,255,0.07)',
                color: tab===id ? '#111' : '#666',
                fontWeight: tab===id ? 600 : 400,
                fontSize:13, cursor:'pointer', transition:'all 0.2s',
              }}>{label}</button>
            ))}
          </div>
          <div style={{ fontSize:12, color:'#444', marginBottom:14 }}>
            {tab==='tit' && '같은 밝기 계열 색상으로 통일감 있는 코디'}
            {tab==='tot' && '같은 색 계열, 명도를 달리한 그라데이션 코디'}
            {tab==='pin' && '실제로 많이 입는 인기 스타일 기반 추천'}
          </div>

          {currentRecs.length > 0 ? currentRecs.map((item, i) => {
            const outfit = item.outfit || item;
            return (
              <div key={i} style={{
                background:'rgba(255,255,255,0.04)', borderRadius:18,
                padding:'16px 14px', marginBottom:12,
                border:'1px solid rgba(255,255,255,0.06)',
              }}>
                {/* 이름 & 스타일 태그 */}
                {item.name && (
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
                    <span style={{ fontWeight:600, fontSize:14 }}>{item.name}</span>
                    <span style={{
                      fontSize:10, color:'#666',
                      background:'rgba(255,255,255,0.07)',
                      padding:'2px 8px', borderRadius:20,
                    }}>{item.style}</span>
                  </div>
                )}

                {/* 4가지 스타일 피규어 */}
                <StyleFigures outfit={outfit}/>

                {/* 색상 스와치 */}
                <div style={{ display:'flex', gap:6, marginTop:12 }}>
                  {PARTS.map(part => {
                    const c = byId(outfit[part]);
                    return (
                      <div key={part} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
                        <div style={{
                          width:'100%', height:20, borderRadius:6,
                          background: c ? c.hex : '#252525',
                          border:'1px solid rgba(255,255,255,0.08)',
                        }}/>
                        <span style={{ fontSize:9, color:'#555' }}>{PART_META[part]}</span>
                        <span style={{ fontSize:9, color:'#444', textAlign:'center' }}>{c?.name||'-'}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          }) : (
            <div style={{ textAlign:'center', padding:'30px 0', color:'#444', fontSize:13 }}>
              일치하는 조합을 찾지 못했어요
            </div>
          )}
        </div>
      )}

      {!recs && (
        <div style={{ textAlign:'center', padding:'16px 20px 40px', color:'#333' }}>
          <div style={{ fontSize:14, lineHeight:1.8 }}>위에서 원하는 부위를 선택하고<br/>색상을 고르면 코디를 추천해드려요</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
