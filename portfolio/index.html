  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #F5F4F0;
      color: #1A1A1A;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }
    .tracking-widest-custom { letter-spacing: 0.25em; }
    .tracking-wide-custom { letter-spacing: 0.12em; }
    .transition-bg { transition: background-color 150ms ease; }
    .transition-border { transition: border-color 150ms ease; }
    .transition-opacity { transition: opacity 150ms ease; }
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,26,26,0.92);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox-overlay img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            offwhite: '#F5F4F0',
            charcoal: '#1A1A1A',
            warmgray: '#8A8A85',
            border: '#E0DED8',
            accent: '#C8521A',

          maxWidth: {
            content: '1280px',
          },

            heading: ['28px', { lineHeight: '36px' }],

  </script>
</head>

  <script type="text/babel">

      },

        image: "https://picsum.photos/seed/werk4/600/750"

        id: 5,

        title: "Proportion Study",

        edition: "Edition of 5",

      {

        image: "https://picsum.photos/seed/werk7/600/750"
      },
      {
        id: 8,
        title: "Threshold",
        artist: "Jan Kessler",
        year: 2024,
        medium: "Acrylic on canvas",
        dimensions: "100 x 130 cm",
        edition: "Unique",
        price: 2800,
        description: "At the boundary between visible and invisible, Kessler's brushwork dissolves into pure chromatic atmosphere. The threshold is where meaning resides.",
        image: "https://picsum.photos/seed/werk8/600/750"
      },
      {
        id: 9,
        title: "Module",
        artist: "Elke Hartmann",
        year: 2019,
        medium: "Gouache on paper",
        dimensions: "40 x 50 cm",
        edition: "Edition of 8",
        price: 640,
        description: "A single repeating unit, explored through systematic variation. Hartmann demonstrates that constraint is the precondition of creative freedom.",
        image: "https://picsum.photos/seed/werk9/600/750"
      },
      {
        id: 10,
        title: "Weiss auf Weiss",
        artist: "Lukas Brandt",
        year: 2023,
        medium: "Oil on canvas",
        dimensions: "80 x 80 cm",
        edition: "Unique",
        price: 1600,
        description: "White on White. In the tradition of Malevich, Brandt pushes monochrome painting to its logical conclusion, finding infinite variation within apparent uniformity.",
        image: "https://picsum.photos/seed/werk10/600/750"
      }
    ];

    const ARTISTS = [...new Set(PAINTINGS.map(p => p.artist))];

    // ========================================
    // Cart Context
    // ========================================
    const CartContext = createContext();

    function CartProvider({ children }) {
      const [items, setItems] = useState([]);

      const addToCart = useCallback((painting) => {
        setItems(prev => {
          const existing = prev.find(item => item.id === painting.id);
          if (existing) {
            return prev.map(item =>
              item.id === painting.id ? { ...item, quantity: item.quantity + 1 } : item
            );
          }
          return [...prev, { ...painting, quantity: 1 }];
        });
      }, []);

      const removeFromCart = useCallback((id) => {
        setItems(prev => prev.filter(item => item.id !== id));
      }, []);

      const updateQuantity = useCallback((id, quantity) => {
        if (quantity < 1) {
          setItems(prev => prev.filter(item => item.id !== id));
          return;
        }
        setItems(prev =>
          prev.map(item => item.id === id ? { ...item, quantity } : item)
        );
      }, []);

      const totalItems = useMemo(() => items.reduce((sum, item) => sum + item.quantity, 0), [items]);
      const subtotal = useMemo(() => items.reduce((sum, item) => sum + item.price * item.quantity, 0), [items]);

      return (
        <CartContext.Provider value={{ items, addToCart, removeFromCart, updateQuantity, totalItems, subtotal }}>
          {children}
        </CartContext.Provider>
      );
    }

    function useCart() { return useContext(CartContext); }

    // ========================================
    // Router
    // ========================================
    const RouterContext = createContext();

    function matchRoute(pattern, path) {
      const patternParts = pattern.split('/').filter(Boolean);
      const pathParts = path.split('/').filter(Boolean);
      if (patternParts.length !== pathParts.length) return null;
      const params = {};
      for (let i = 0; i < patternParts.length; i++) {
        if (patternParts[i].startsWith(':')) {
          params[patternParts[i].slice(1)] = pathParts[i];
        } else if (patternParts[i] !== pathParts[i]) {
          return null;
        }
      }
      return params;
    }

    function Router({ children }) {
      const [path, setPath] = useState(window.location.hash.slice(1) || '/');
      useEffect(() => {
        const handler = () => setPath(window.location.hash.slice(1) || '/');
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
      }, []);
      const navigate = useCallback((to) => { window.location.hash = to; }, []);
      return (
        <RouterContext.Provider value={{ path, navigate }}>
          {children}
        </RouterContext.Provider>
      );
    }

    function useRouter() { return useContext(RouterContext); }

    function useParams(pattern) {
      const { path } = useRouter();
      return matchRoute(pattern, path) || {};
    }

    function Routes({ children }) {
      const { path } = useRouter();
      const routes = React.Children.toArray(children);
      for (const route of routes) {
        const match = matchRoute(route.props.path, path);
        if (match !== null) {
          return React.cloneElement(route.props.element, { params: match });
        }
      }
      return routes[0] ? React.cloneElement(routes[0].props.element) : null;
    }

    function Route({ path, element }) { return null; }

    function Link({ to, children, className, onClick: onClickProp }) {
      const { navigate } = useRouter();
      const handleClick = (e) => {
        e.preventDefault();
        if (onClickProp) onClickProp(e);
        navigate(to);
        window.scrollTo(0, 0);
      };
      return <a href={`#${to}`} onClick={handleClick} className={className}>{children}</a>;
    }

    // ========================================
    // Design System Components
    // ========================================
    function Button({ variant = 'primary', size = 'md', children, onClick, disabled, className = '' }) {
      const base = 'inline-flex items-center justify-center font-normal tracking-wide-custom uppercase transition-bg cursor-pointer';
      const variants = {
        primary: 'bg-accent text-offwhite hover:bg-[#B0471A]',
        secondary: 'bg-transparent text-charcoal border border-border hover:bg-[#E8E7E3]',
        ghost: 'bg-transparent text-warmgray hover:text-charcoal',
      };
      const sizes = {
        sm: 'text-label px-4 py-2',
        md: 'text-body px-6 py-3',
        lg: 'text-sub px-8 py-4',
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-40 cursor-not-allowed' : ''} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Pill({ active, children, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`text-label uppercase tracking-wide-custom px-4 py-2 transition-bg cursor-pointer ${
            active
              ? 'bg-charcoal text-offwhite'
              : 'bg-transparent text-warmgray border border-border hover:text-charcoal hover:border-warmgray'
          }`}
        >
          {children}
        </button>
      );
    }

    function Lightbox({ src, alt, onClose }) {
      useEffect(() => {
        const handler = (e) => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', handler);
        return () => document.removeEventListener('keydown', handler);
      }, [onClose]);
      return (
        <div className="lightbox-overlay" onClick={onClose} role="dialog" aria-label="Image zoom">
          <img src={src} alt={alt} />
        </div>
      );
    }

    // ========================================
    // Navigation
    // ========================================
    function Nav() {
      const { totalItems } = useCart();
      const { path } = useRouter();
      const linkClass = (target) => {
        const isActive = path === target || (target === '/gallery' && path.startsWith('/product'));
        return `text-label uppercase tracking-widest-custom transition-bg px-2 py-1 ${
          isActive ? 'text-charcoal' : 'text-warmgray hover:text-charcoal'
        }`;
      };
      return (
        <nav className="fixed top-0 left-0 right-0 bg-offwhite z-50 border-b border-border" style={{ height: '64px' }}>
          <div className="max-w-content mx-auto h-full flex items-center justify-between px-6 md:px-8">
            <Link to="/" className="text-body uppercase tracking-widest-custom font-medium text-charcoal">
              W E R K
            </Link>
            <div className="flex items-center gap-8">
              <Link to="/gallery" className={linkClass('/gallery')}>Gallery</Link>
              <Link to="/about" className={linkClass('/about')}>About</Link>
              <Link to="/cart" className={`${linkClass('/cart')} relative`}>
                Cart
                {totalItems > 0 && (
                  <span className="absolute -top-1 -right-4 bg-accent text-offwhite text-label w-5 h-5 flex items-center justify-center rounded-full" style={{ fontSize: '10px' }}>
                    {totalItems}
                  </span>
                )}
              </Link>
            </div>
          </div>
        </nav>
      );
    }

    // ========================================
    // Footer
    // ========================================
    function Footer() {

        <footer className="border-t border-border" style={{ padding: '40px 0' }}>
          <div className="max-w-content mx-auto px-6 md:px-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <p className="text-label text-warmgray uppercase tracking-wide-custom">
              &copy; 2026 Werk. Less, but better.
            </p>
            <div className="flex gap-8">
              <Link to="/about" className="text-label text-warmgray uppercase tracking-wide-custom hover:text-charcoal transition-bg">About</Link>
              <Link to="/gallery" className="text-label text-warmgray uppercase tracking-wide-custom hover:text-charcoal transition-bg">Gallery</Link>
            </div>
          </div>
        </footer>
      );
    }

    // ========================================
    // Page: Home
    // ========================================
    function HomePage() {
      const featured = PAINTINGS[3];
      return (
        <div>
          <section style={{ paddingTop: '144px', paddingBottom: '80px' }}>
            <div className="max-w-content mx-auto px-6 md:px-8">
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                <div>
                  <p className="text-label uppercase tracking-widest-custom text-warmgray mb-6">Curated works</p>
                  <h1 className="text-hero font-light text-charcoal leading-tight mb-8" style={{ letterSpacing: '-0.02em' }}>
                    Form follows function.<br />Art follows truth.
                  </h1>
                  <p className="text-body text-warmgray mb-10" style={{ maxWidth: '420px', lineHeight: '1.7' }}>
                    Werk is a curated collection of contemporary paintings rooted in restraint, precision, and the conviction that what is removed matters as much as what remains.
                  </p>
                  <Link to="/gallery">
                    <Button variant="primary" size="md">View Collection</Button>
                  </Link>
                </div>
                <Link to={`/product/${featured.id}`} className="block">
                  <div className="border border-border">
                    <img
                      src={featured.image}

                  </div>

                      <p className="text-label text-warmgray uppercase tracking-wide-custom mt-1">{featured.artist}, {featured.year}</p>
                    </div>
                    <p className="text-body text-accent">&euro;{featured.price.toLocaleString()}</p>
                  </div>
                </Link>
              </div>
            </div>

          <section style={{ padding: '80px 0' }} className="border-t border-border">
            <div className="max-w-content mx-auto px-6 md:px-8">
              <p className="text-label uppercase tracking-widest-custom text-warmgray mb-10">Selected works</p>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                {PAINTINGS.slice(0, 3).map(p => (
                  <Link to={`/product/${p.id}`} key={p.id} className="block group">

    // ========================================
    // Page: Gallery
    // ========================================
    function GalleryPage() {
      const [filter, setFilter] = useState('All');
      const filtered = filter === 'All' ? PAINTINGS : PAINTINGS.filter(p => p.artist === filter);
      return (
        <div style={{ paddingTop: '144px', paddingBottom: '80px' }}>
          <div className="max-w-content mx-auto px-6 md:px-8">
            <h1 className="text-heading font-light text-charcoal mb-2" style={{ letterSpacing: '-0.01em' }}>Gallery</h1>
            <p className="text-body text-warmgray mb-10">{PAINTINGS.length} works available</p>

            <div className="flex flex-wrap gap-2 mb-12">
              <Pill active={filter === 'All'} onClick={() => setFilter('All')}>All</Pill>
              {ARTISTS.map(a => (
                <Pill key={a} active={filter === a} onClick={() => setFilter(a)}>{a}</Pill>
              ))}
            </div>

              {filtered.map(p => (
                <Link to={`/product/${p.id}`} key={p.id} className="block group">

                    <img src={p.image} alt={p.title} className="w-full object-cover" style={{ aspectRatio: '4/5' }} loading="lazy" />
                  </div>
                  <div className="mt-4 pb-4 border-b border-transparent group-hover:border-accent transition-border">
                    <p className="text-body text-charcoal">{p.title}</p>
                    <p className="text-label text-warmgray uppercase tracking-wide-custom mt-1">

                      <p className="text-body text-accent">&euro;{p.price.toLocaleString()}</p>
                    </div>
                  </div>
                </Link>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ========================================

    function ProductPage({ params }) {
      const { navigate } = useRouter();
      const { addToCart } = useCart();
      const [lightbox, setLightbox] = useState(false);
      const [added, setAdded] = useState(false);

      const painting = PAINTINGS.find(p => p.id === Number(params?.id));
      if (!painting) {
        return (
          <div style={{ paddingTop: '144px', paddingBottom: '80px' }}>
            <div className="max-w-content mx-auto px-6 md:px-8">
              <p className="text-body text-warmgray">Work not found.</p>
              <Link to="/gallery"><Button variant="secondary" size="sm" className="mt-4">Back to Gallery</Button></Link>
            </div>
          </div>
        );
      }

      const handleAdd = () => {
        addToCart(painting);
        setAdded(true);
        setTimeout(() => setAdded(false), 1500);
      };

      return (
        <div style={{ paddingTop: '128px', paddingBottom: '80px' }}>
          {lightbox && <Lightbox src={painting.image} alt={painting.title} onClose={() => setLightbox(false)} />}
          <div className="max-w-content mx-auto px-6 md:px-8">
            <button
              onClick={() => navigate('/gallery')}
              className="text-label uppercase tracking-widest-custom text-warmgray hover:text-charcoal transition-bg mb-10 inline-block cursor-pointer"
            >
              &larr; Back to Gallery
            </button>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-16">
              <div
                className="border border-border cursor-zoom-in"
                onClick={() => setLightbox(true)}
                role="button"
                aria-label="Zoom image"
                tabIndex={0}
                onKeyDown={(e) => e.key === 'Enter' && setLightbox(true)}
              >
                <img
                  src={painting.image}
                  alt={painting.title}
                  className="w-full object-cover"
                  style={{ aspectRatio: '4/5' }}
                />
              </div>

              <div className="flex flex-col justify-center">
                <p className="text-label uppercase tracking-widest-custom text-warmgray mb-4">{painting.artist}</p>
                <h1 className="text-heading font-light text-charcoal mb-2" style={{ letterSpacing: '-0.01em' }}>{painting.title}</h1>
                <p className="text-body text-warmgray mb-8">{painting.year}</p>

                <div className="border-t border-border pt-6 mb-8">

                    <div>
                      <p className="text-label uppercase tracking-widest-custom text-warmgray mb-1">Medium</p>
                      <p className="text-body text-charcoal">{painting.medium}</p>
                    </div>
                    <div>
                      <p className="text-label uppercase tracking-widest-custom text-warmgray mb-1">Dimensions</p>
                      <p className="text-body text-charcoal">{painting.dimensions}</p>
                    </div>
                    <div>
                      <p className="text-label uppercase tracking-widest-custom text-warmgray mb-1">Edition</p>
                      <p className="text-body text-charcoal">{painting.edition}</p>
                    </div>
                    <div>
                      <p className="text-label uppercase tracking-widest-custom text-warmgray mb-1">Year</p>
                      <p className="text-body text-charcoal">{painting.year}</p>
                    </div>
                  </div>
                </div>

                <p className="text-body text-warmgray mb-8" style={{ lineHeight: '1.7' }}>{painting.description}</p>

                <div className="border-t border-border pt-6 flex items-center justify-between">
                  <p className="text-sub text-accent font-light">&euro;{painting.price.toLocaleString()}</p>
                  <Button variant="primary" size="md" onClick={handleAdd}>
                    {added ? 'Added' : 'Add to Cart'}
                  </Button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // Page: Cart
    // ========================================
    function CartPage() {
      const { items, removeFromCart, updateQuantity, subtotal } = useCart();

      return (
        <div style={{ paddingTop: '144px', paddingBottom: '80px' }}>
          <div className="max-w-content mx-auto px-6 md:px-8">
            <h1 className="text-heading font-light text-charcoal mb-2" style={{ letterSpacing: '-0.01em' }}>Cart</h1>
            <p className="text-body text-warmgray mb-10">
              {items.length === 0 ? 'Your cart is empty.' : `${items.length} ${items.length === 1 ? 'item' : 'items'}`}
            </p>

            {items.length === 0 ? (
              <div className="py-16 text-center">
                <p className="text-body text-warmgray mb-6">Nothing here yet.</p>
                <Link to="/gallery"><Button variant="secondary" size="md">Browse Gallery</Button></Link>
              </div>
            ) : (
              <div>
                <div className="border-t border-border">
                  {items.map(item => (
                    <div key={item.id} className="border-b border-border py-6 grid grid-cols-[80px_1fr_auto] md:grid-cols-[120px_1fr_auto] gap-6 items-center">
                      <Link to={`/product/${item.id}`}>
                        <img src={item.image} alt={item.title} className="w-full object-cover border border-border" style={{ aspectRatio: '4/5' }} />
                      </Link>
                      <div>
                        <Link to={`/product/${item.id}`} className="text-body text-charcoal hover:text-accent transition-bg">{item.title}</Link>
                        <p className="text-label text-warmgray uppercase tracking-wide-custom mt-1">{item.artist}</p>
                        <p className="text-label text-warmgray mt-1">{item.dimensions}</p>
                        <div className="flex items-center gap-3 mt-3">
                          <button
                            onClick={() => updateQuantity(item.id, item.quantity - 1)}
                            className="w-8 h-8 border border-border text-warmgray hover:text-charcoal hover:border-warmgray transition-bg flex items-center justify-center text-body cursor-pointer"
                            aria-label="Decrease quantity"
                          >
                            &minus;
                          </button>
                          <span className="text-body text-charcoal w-6 text-center">{item.quantity}</span>
                          <button
                            onClick={() => updateQuantity(item.id, item.quantity + 1)}
                            className="w-8 h-8 border border-border text-warmgray hover:text-charcoal hover:border-warmgray transition-bg flex items-center justify-center text-body cursor-pointer"
                            aria-label="Increase quantity"
                          >
                            +
                          </button>
                          <button
                            onClick={() => removeFromCart(item.id)}
                            className="text-label uppercase tracking-wide-custom text-warmgray hover:text-accent transition-bg ml-4 cursor-pointer"
                          >
                            Remove
                          </button>
                        </div>
                      </div>
                      <p className="text-body text-accent text-right">&euro;{(item.price * item.quantity).toLocaleString()}</p>
                    </div>
                  ))}
                </div>

                <div className="mt-8 flex flex-col items-end">
                  <div className="flex justify-between w-full max-w-xs mb-6">
                    <p className="text-label uppercase tracking-widest-custom text-warmgray">Subtotal</p>
                    <p className="text-sub text-charcoal font-light">&euro;{subtotal.toLocaleString()}</p>
                  </div>
                  <Button variant="primary" size="lg">Proceed to Checkout</Button>
                  <p className="text-label text-warmgray mt-3">Shipping calculated at checkout</p>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

                </div>

                  <p className="text-label uppercase tracking-widest-custom text-warmgray mb-2">Contact</p>

    // ========================================
    // App Component
    // ========================================
    function App() {
      return (
        <CartProvider>
          <Router>
            <div className="min-h-screen flex flex-col bg-offwhite">
              <Nav />
              <main className="flex-1">
                <Routes>
                  <Route path="/" element={<HomePage />} />
                  <Route path="/gallery" element={<GalleryPage />} />
                  <Route path="/product/:id" element={<ProductPage />} />
                  <Route path="/cart" element={<CartPage />} />
                  <Route path="/about" element={<AboutPage />} />
                </Routes>
              </main>
              <Footer />

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</body>
