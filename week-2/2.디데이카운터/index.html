<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-Day Counter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'bounce-in': 'bounceIn 0.5s ease-out',
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.3s ease-out',
          }
        }
      }
    }
  </script>
  <style>
    @keyframes bounceIn {
      0% { transform: scale(0.9); opacity: 0; }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes countPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .dday-pulse {
      animation: countPulse 2s ease-in-out infinite;
    }
    .card-hover {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card-hover:hover {
      transform: translateY(-4px);
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
    }
    .dark input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef, createContext, useContext } = React;

    // ========================================
    // Constants & Utilities
    // ========================================

    const CATEGORIES = [
      { id: 'birthday', label: '생일', icon: '🎂' },
      { id: 'anniversary', label: '기념일', icon: '💍' },
      { id: 'deadline', label: '마감일', icon: '📋' },
      { id: 'goal', label: '목표', icon: '🎯' },
      { id: 'travel', label: '여행', icon: '✈️' },
      { id: 'exam', label: '시험', icon: '📝' },
      { id: 'event', label: '이벤트', icon: '🎉' },
      { id: 'other', label: '기타', icon: '📌' },
    ];

    const COLOR_THEMES = [
      { id: 'blue', label: '블루', from: 'from-blue-500', to: 'to-cyan-400', bg: 'bg-blue-500', ring: 'ring-blue-400', text: 'text-blue-500', light: 'bg-blue-50 dark:bg-blue-950', gradient: 'from-blue-500 to-cyan-400' },
      { id: 'purple', label: '퍼플', from: 'from-purple-500', to: 'to-pink-400', bg: 'bg-purple-500', ring: 'ring-purple-400', text: 'text-purple-500', light: 'bg-purple-50 dark:bg-purple-950', gradient: 'from-purple-500 to-pink-400' },
      { id: 'green', label: '그린', from: 'from-emerald-500', to: 'to-teal-400', bg: 'bg-emerald-500', ring: 'ring-emerald-400', text: 'text-emerald-500', light: 'bg-emerald-50 dark:bg-emerald-950', gradient: 'from-emerald-500 to-teal-400' },
      { id: 'orange', label: '오렌지', from: 'from-orange-500', to: 'to-amber-400', bg: 'bg-orange-500', ring: 'ring-orange-400', text: 'text-orange-500', light: 'bg-orange-50 dark:bg-orange-950', gradient: 'from-orange-500 to-amber-400' },
      { id: 'rose', label: '로즈', from: 'from-rose-500', to: 'to-pink-400', bg: 'bg-rose-500', ring: 'ring-rose-400', text: 'text-rose-500', light: 'bg-rose-50 dark:bg-rose-950', gradient: 'from-rose-500 to-pink-400' },
      { id: 'indigo', label: '인디고', from: 'from-indigo-500', to: 'to-violet-400', bg: 'bg-indigo-500', ring: 'ring-indigo-400', text: 'text-indigo-500', light: 'bg-indigo-50 dark:bg-indigo-950', gradient: 'from-indigo-500 to-violet-400' },
    ];

    function getColorTheme(colorId) {
      return COLOR_THEMES.find(c => c.id === colorId) || COLOR_THEMES[0];
    }

    function getCategoryInfo(catId) {
      return CATEGORIES.find(c => c.id === catId) || CATEGORIES[CATEGORIES.length - 1];
    }

    function calcDDay(targetDate) {
      const now = new Date();
      const target = new Date(targetDate + 'T00:00:00');
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const diffMs = target.getTime() - todayStart.getTime();
      const diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24));
      return diffDays;
    }

    function calcTimeRemaining(targetDate) {
      const now = new Date();
      const target = new Date(targetDate + 'T00:00:00');
      const diffMs = target.getTime() - now.getTime();
      if (diffMs <= 0) return { hours: 0, minutes: 0, seconds: 0, total: 0 };
      const hours = Math.floor(diffMs / (1000 * 60 * 60));
      const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diffMs % (1000 * 60)) / 1000);
      return { hours, minutes, seconds, total: diffMs };
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      return `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}. (${days[d.getDay()]})`;
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    // ========================================
    // Dark Mode Context
    // ========================================

    const DarkModeContext = createContext();

    function DarkModeProvider({ children }) {
      const [dark, setDark] = useState(() => {
        const saved = localStorage.getItem('dday-darkmode');
        if (saved !== null) return JSON.parse(saved);
        return window.matchMedia('(prefers-color-scheme: dark)').matches;
      });

      useEffect(() => {
        localStorage.setItem('dday-darkmode', JSON.stringify(dark));
        document.documentElement.classList.toggle('dark', dark);
      }, [dark]);

      return (
        <DarkModeContext.Provider value={{ dark, toggleDark: () => setDark(d => !d) }}>
          {children}
        </DarkModeContext.Provider>
      );
    }

    function useDarkMode() { return useContext(DarkModeContext); }

    // ========================================
    // Design System Components
    // ========================================

    function Button({ variant = 'primary', size = 'md', disabled = false, onClick, className = '', children, ...props }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 dark:focus:ring-offset-gray-900 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-gradient-to-r from-blue-500 to-cyan-500 text-white hover:from-blue-600 hover:to-cyan-600 shadow-md hover:shadow-lg focus:ring-blue-400',
        secondary: 'bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-600 focus:ring-gray-400',
        danger: 'bg-red-500 text-white hover:bg-red-600 focus:ring-red-400',
        ghost: 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 focus:ring-gray-400',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm gap-1.5',
        md: 'px-4 py-2 text-sm gap-2',
        lg: 'px-6 py-3 text-base gap-2',
      };
      return (
        <button className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} disabled={disabled} onClick={onClick} {...props}>
          {children}
        </button>
      );
    }

    function Input({ label, error, className = '', ...props }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{label}</label>}
          <input
            className={`w-full px-3.5 py-2.5 rounded-xl border ${error ? 'border-red-400 focus:ring-red-400' : 'border-gray-200 dark:border-gray-600 focus:ring-blue-400'} bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:border-transparent transition-all duration-200`}
            {...props}
          />
          {error && <p className="mt-1 text-sm text-red-500">{error}</p>}
        </div>
      );
    }

    function Select({ label, options, className = '', ...props }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{label}</label>}
          <select
            className="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200"
            {...props}
          >
            {options.map(opt => (
              <option key={opt.value} value={opt.value}>{opt.label}</option>
            ))}
          </select>
        </div>
      );
    }

    function Textarea({ label, className = '', ...props }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">{label}</label>}
          <textarea
            className="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200 resize-none"
            rows={3}
            {...props}
          />
        </div>
      );
    }

    function Modal({ isOpen, onClose, title, children, size = 'md' }) {
      useEffect(() => {
        if (isOpen) document.body.style.overflow = 'hidden';
        else document.body.style.overflow = '';
        return () => { document.body.style.overflow = ''; };
      }, [isOpen]);

      if (!isOpen) return null;
      const sizes = { sm: 'max-w-sm', md: 'max-w-lg', lg: 'max-w-2xl' };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in" onClick={onClose}>
          <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" />
          <div
            className={`relative ${sizes[size]} w-full bg-white dark:bg-gray-800 rounded-2xl shadow-2xl animate-slide-up max-h-[90vh] overflow-y-auto`}
            onClick={e => e.stopPropagation()}
          >
            <div className="flex items-center justify-between p-5 border-b border-gray-100 dark:border-gray-700">
              <h2 className="text-lg font-bold text-gray-900 dark:text-white">{title}</h2>
              <button onClick={onClose} className="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" aria-label="닫기">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
            </div>
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    function Badge({ children, className = '' }) {
      return (
        <span className={`inline-flex items-center gap-1 px-2.5 py-1 text-xs font-medium rounded-full ${className}`}>
          {children}
        </span>
      );
    }

    // ========================================
    // Live Timer Hook
    // ========================================

    function useLiveTimer(targetDate, enabled = true) {
      const [time, setTime] = useState(() => calcTimeRemaining(targetDate));
      useEffect(() => {
        if (!enabled) return;
        const tick = () => setTime(calcTimeRemaining(targetDate));
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, [targetDate, enabled]);
      return time;
    }

    // ========================================
    // Event Form Component
    // ========================================

    function EventForm({ event, onSave, onCancel }) {
      const [form, setForm] = useState({
        name: event?.name || '',
        date: event?.date || new Date().toISOString().split('T')[0],
        category: event?.category || 'other',
        color: event?.color || 'blue',
        memo: event?.memo || '',
      });
      const [errors, setErrors] = useState({});

      const handleSubmit = (e) => {
        e.preventDefault();
        const errs = {};
        if (!form.name.trim()) errs.name = '이벤트 이름을 입력하세요';
        if (!form.date) errs.date = '날짜를 선택하세요';
        if (Object.keys(errs).length) { setErrors(errs); return; }
        onSave({
          id: event?.id || generateId(),
          ...form,
          name: form.name.trim(),
          memo: form.memo.trim(),
          createdAt: event?.createdAt || Date.now(),
        });
      };

      const set = (key) => (e) => { setForm(f => ({ ...f, [key]: e.target.value })); setErrors(er => ({ ...er, [key]: undefined })); };

      return (
        <form onSubmit={handleSubmit} className="space-y-4">
          <Input label="이벤트 이름" value={form.name} onChange={set('name')} placeholder="예: 생일 파티" error={errors.name} />
          <Input label="목표 날짜" type="date" value={form.date} onChange={set('date')} error={errors.date} />
          <Select
            label="카테고리"
            value={form.category}
            onChange={set('category')}
            options={CATEGORIES.map(c => ({ value: c.id, label: `${c.icon} ${c.label}` }))}
          />
          <div>
            <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">색상 테마</label>
            <div className="flex gap-2 flex-wrap">
              {COLOR_THEMES.map(c => (
                <button
                  key={c.id}
                  type="button"
                  onClick={() => setForm(f => ({ ...f, color: c.id }))}
                  className={`w-10 h-10 rounded-xl bg-gradient-to-br ${c.gradient} transition-all duration-200 ${form.color === c.id ? 'ring-2 ring-offset-2 dark:ring-offset-gray-800 ' + c.ring + ' scale-110' : 'opacity-60 hover:opacity-100'}`}
                  aria-label={c.label}
                  title={c.label}
                />
              ))}
            </div>
          </div>
          <Textarea label="메모 (선택)" value={form.memo} onChange={set('memo')} placeholder="추가 메모를 작성하세요..." />
          <div className="flex gap-3 pt-2">
            <Button type="submit" className="flex-1">{event ? '수정 완료' : '추가하기'}</Button>
            <Button type="button" variant="secondary" onClick={onCancel}>취소</Button>
          </div>
        </form>
      );
    }

    // ========================================
    // D-Day Card Component
    // ========================================

    function DDayCard({ event, viewMode, onEdit, onDelete }) {
      const dday = calcDDay(event.date);
      const theme = getColorTheme(event.color);
      const cat = getCategoryInfo(event.category);
      const isToday = dday === 0;
      const isPast = dday < 0;
      const isFuture = dday > 0;
      const showLiveTimer = isFuture && dday <= 7;
      const timer = useLiveTimer(event.date, showLiveTimer);

      const progressPercent = useMemo(() => {
        if (isPast) return 100;
        const created = new Date(event.createdAt);
        const target = new Date(event.date + 'T00:00:00');
        const now = new Date();
        const total = target.getTime() - created.getTime();
        const elapsed = now.getTime() - created.getTime();
        if (total <= 0) return 100;
        return Math.min(100, Math.max(0, (elapsed / total) * 100));
      }, [event.createdAt, event.date, isPast, dday]);

      const ddayText = isToday ? 'D-Day!' : isFuture ? `D-${dday}` : `D+${Math.abs(dday)}`;

      const isGrid = viewMode === 'grid';

      return (
        <div className={`card-hover animate-bounce-in group relative rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition-shadow bg-white dark:bg-gray-800 ${isGrid ? '' : 'flex'}`}>
          {/* Color accent top bar (grid) or left bar (list) */}
          {isGrid ? (
            <div className={`h-2 bg-gradient-to-r ${theme.gradient}`} />
          ) : (
            <div className={`w-2 bg-gradient-to-b ${theme.gradient} flex-shrink-0`} />
          )}

          <div className={`p-4 ${isGrid ? '' : 'flex-1 flex items-center gap-4'}`}>
            {/* Main content area */}
            <div className={isGrid ? '' : 'flex-1 min-w-0'}>
              {/* Category badge and actions */}
              <div className="flex items-center justify-between mb-2">
                <Badge className={`${theme.light} ${theme.text}`}>
                  {cat.icon} {cat.label}
                </Badge>
                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                  <button onClick={() => onEdit(event)} className="p-1.5 rounded-lg text-gray-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors" aria-label="수정">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                  </button>
                  <button onClick={() => onDelete(event.id)} className="p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors" aria-label="삭제">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                  </button>
                </div>
              </div>

              {/* Event name */}
              <h3 className="text-base font-bold text-gray-900 dark:text-white truncate mb-1">{event.name}</h3>

              {/* Target date */}
              <p className="text-xs text-gray-500 dark:text-gray-400 mb-3">{formatDate(event.date)}</p>

              {/* Memo */}
              {event.memo && (
                <p className="text-xs text-gray-400 dark:text-gray-500 truncate mb-3">{event.memo}</p>
              )}
            </div>

            {/* D-Day display */}
            <div className={`${isGrid ? 'text-center py-3' : 'flex-shrink-0 text-center px-4'}`}>
              <div className={`text-3xl font-black bg-gradient-to-r ${theme.gradient} bg-clip-text text-transparent ${isToday ? 'dday-pulse text-4xl' : ''}`}>
                {ddayText}
              </div>
              {showLiveTimer && (
                <div className="flex items-center justify-center gap-1 mt-1.5 text-xs text-gray-500 dark:text-gray-400 font-mono">
                  <span>{String(timer.hours).padStart(2, '0')}</span>
                  <span className="animate-pulse">:</span>
                  <span>{String(timer.minutes).padStart(2, '0')}</span>
                  <span className="animate-pulse">:</span>
                  <span>{String(timer.seconds).padStart(2, '0')}</span>
                </div>
              )}
              {isToday && (
                <p className="text-xs font-semibold text-amber-500 mt-1 animate-pulse">오늘이에요!</p>
              )}
            </div>

            {/* Progress bar */}
            <div className={isGrid ? 'mt-3' : 'hidden sm:block flex-shrink-0 w-24'}>
              <div className="flex items-center justify-between text-xs text-gray-400 dark:text-gray-500 mb-1">
                <span>진행률</span>
                <span>{Math.round(progressPercent)}%</span>
              </div>
              <div className="h-1.5 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                <div
                  className={`h-full bg-gradient-to-r ${theme.gradient} rounded-full transition-all duration-1000 ease-out`}
                  style={{ width: `${progressPercent}%` }}
                />
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // Statistics Panel
    // ========================================

    function StatsPanel({ events }) {
      const stats = useMemo(() => {
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        let upcoming = 0, past = 0, todayCount = 0;
        let nearest = null;
        let nearestDays = Infinity;

        events.forEach(ev => {
          const dd = calcDDay(ev.date);
          if (dd > 0) {
            upcoming++;
            if (dd < nearestDays) { nearestDays = dd; nearest = ev; }
          } else if (dd < 0) {
            past++;
          } else {
            todayCount++;
            nearest = ev;
            nearestDays = 0;
          }
        });

        return { total: events.length, upcoming, past, todayCount, nearest, nearestDays };
      }, [events]);

      const statItems = [
        { label: '전체', value: stats.total, icon: '📊', color: 'from-blue-500 to-cyan-400' },
        { label: '다가오는', value: stats.upcoming, icon: '⏳', color: 'from-emerald-500 to-teal-400' },
        { label: '지난', value: stats.past, icon: '📅', color: 'from-gray-400 to-gray-500' },
        { label: '오늘', value: stats.todayCount, icon: '🎉', color: 'from-amber-500 to-orange-400' },
      ];

      return (
        <div className="mb-6 animate-fade-in">
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
            {statItems.map(s => (
              <div key={s.label} className="bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow">
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-lg">{s.icon}</span>
                  <span className="text-xs text-gray-500 dark:text-gray-400">{s.label}</span>
                </div>
                <p className={`text-2xl font-black bg-gradient-to-r ${s.color} bg-clip-text text-transparent`}>{s.value}</p>
              </div>
            ))}
          </div>
          {stats.nearest && (
            <div className="bg-gradient-to-r from-blue-500/10 to-cyan-500/10 dark:from-blue-500/20 dark:to-cyan-500/20 rounded-2xl p-4 border border-blue-200/50 dark:border-blue-800/50">
              <p className="text-xs text-blue-600 dark:text-blue-400 font-medium mb-1">
                {stats.nearestDays === 0 ? '오늘의 이벤트' : '가장 가까운 이벤트'}
              </p>
              <p className="text-sm font-bold text-gray-900 dark:text-white">
                {stats.nearest.name}
                <span className="ml-2 text-blue-500 font-black">
                  {stats.nearestDays === 0 ? 'D-Day!' : `D-${stats.nearestDays}`}
                </span>
              </p>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Empty State
    // ========================================

    function EmptyState({ onAdd }) {
      return (
        <div className="flex flex-col items-center justify-center py-20 animate-fade-in">
          <div className="text-6xl mb-4">📅</div>
          <h3 className="text-xl font-bold text-gray-900 dark:text-white mb-2">아직 등록된 D-Day가 없어요</h3>
          <p className="text-gray-500 dark:text-gray-400 mb-6 text-center">중요한 날을 추가하고<br />D-Day를 카운트다운하세요!</p>
          <Button onClick={onAdd} size="lg">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
            첫 번째 D-Day 추가
          </Button>
        </div>
      );
    }

    // ========================================
    // Confirm Dialog
    // ========================================

    function ConfirmDialog({ isOpen, onClose, onConfirm, title, message }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in" onClick={onClose}>
          <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" />
          <div className="relative max-w-sm w-full bg-white dark:bg-gray-800 rounded-2xl shadow-2xl animate-slide-up p-6" onClick={e => e.stopPropagation()}>
            <h3 className="text-lg font-bold text-gray-900 dark:text-white mb-2">{title}</h3>
            <p className="text-sm text-gray-500 dark:text-gray-400 mb-5">{message}</p>
            <div className="flex gap-3">
              <Button variant="danger" onClick={onConfirm} className="flex-1">삭제</Button>
              <Button variant="secondary" onClick={onClose} className="flex-1">취소</Button>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // Header Component
    // ========================================

    function Header({ onAdd }) {
      const { dark, toggleDark } = useDarkMode();
      return (
        <header className="bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl sticky top-0 z-40 border-b border-gray-100 dark:border-gray-800">
          <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div className="flex items-center gap-2.5">
              <span className="text-2xl">📅</span>
              <h1 className="text-xl font-black bg-gradient-to-r from-blue-600 to-cyan-500 bg-clip-text text-transparent">D-Day Counter</h1>
            </div>
            <div className="flex items-center gap-2">
              <button
                onClick={toggleDark}
                className="p-2.5 rounded-xl text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                aria-label="다크모드 전환"
              >
                {dark ? (
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                ) : (
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                )}
              </button>
              <Button onClick={onAdd} size="md">
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
                추가
              </Button>
            </div>
          </div>
        </header>
      );
    }

    // ========================================
    // Toolbar Component
    // ========================================

    function Toolbar({ viewMode, setViewMode, sortBy, setSortBy, filterCategory, setFilterCategory }) {
      return (
        <div className="flex flex-wrap items-center gap-3 mb-5">
          {/* View toggle */}
          <div className="flex bg-gray-100 dark:bg-gray-800 rounded-xl p-1">
            <button
              onClick={() => setViewMode('grid')}
              className={`p-2 rounded-lg transition-colors ${viewMode === 'grid' ? 'bg-white dark:bg-gray-700 shadow-sm text-blue-500' : 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'}`}
              aria-label="그리드 보기"
            >
              <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
            </button>
            <button
              onClick={() => setViewMode('list')}
              className={`p-2 rounded-lg transition-colors ${viewMode === 'list' ? 'bg-white dark:bg-gray-700 shadow-sm text-blue-500' : 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'}`}
              aria-label="리스트 보기"
            >
              <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clipRule="evenodd" /></svg>
            </button>
          </div>

          {/* Sort */}
          <select
            value={sortBy}
            onChange={e => setSortBy(e.target.value)}
            className="px-3 py-2 rounded-xl text-sm bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 border-0 focus:outline-none focus:ring-2 focus:ring-blue-400"
          >
            <option value="nearest">가까운 순</option>
            <option value="farthest">먼 순</option>
            <option value="recent">최근 추가 순</option>
            <option value="alpha">가나다 순</option>
          </select>

          {/* Filter */}
          <select
            value={filterCategory}
            onChange={e => setFilterCategory(e.target.value)}
            className="px-3 py-2 rounded-xl text-sm bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 border-0 focus:outline-none focus:ring-2 focus:ring-blue-400"
          >
            <option value="all">전체 카테고리</option>
            {CATEGORIES.map(c => (
              <option key={c.id} value={c.id}>{c.icon} {c.label}</option>
            ))}
          </select>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================

    function App() {
      const [events, setEvents] = useState(() => {
        try {
          const saved = localStorage.getItem('dday-events');
          return saved ? JSON.parse(saved) : [];
        } catch { return []; }
      });

      const [modalOpen, setModalOpen] = useState(false);
      const [editingEvent, setEditingEvent] = useState(null);
      const [deleteId, setDeleteId] = useState(null);
      const [viewMode, setViewMode] = useState(() => localStorage.getItem('dday-viewmode') || 'grid');
      const [sortBy, setSortBy] = useState('nearest');
      const [filterCategory, setFilterCategory] = useState('all');

      // Persist events
      useEffect(() => {
        localStorage.setItem('dday-events', JSON.stringify(events));
      }, [events]);

      // Persist view mode
      useEffect(() => {
        localStorage.setItem('dday-viewmode', viewMode);
      }, [viewMode]);

      // Filtered & sorted events
      const displayedEvents = useMemo(() => {
        let list = [...events];
        if (filterCategory !== 'all') {
          list = list.filter(ev => ev.category === filterCategory);
        }
        switch (sortBy) {
          case 'nearest':
            list.sort((a, b) => Math.abs(calcDDay(a.date)) - Math.abs(calcDDay(b.date)));
            break;
          case 'farthest':
            list.sort((a, b) => Math.abs(calcDDay(b.date)) - Math.abs(calcDDay(a.date)));
            break;
          case 'recent':
            list.sort((a, b) => b.createdAt - a.createdAt);
            break;
          case 'alpha':
            list.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
            break;
        }
        return list;
      }, [events, filterCategory, sortBy]);

      const handleAdd = () => { setEditingEvent(null); setModalOpen(true); };
      const handleEdit = (ev) => { setEditingEvent(ev); setModalOpen(true); };

      const handleSave = (ev) => {
        setEvents(prev => {
          const idx = prev.findIndex(e => e.id === ev.id);
          if (idx >= 0) {
            const next = [...prev];
            next[idx] = ev;
            return next;
          }
          return [...prev, ev];
        });
        setModalOpen(false);
        setEditingEvent(null);
      };

      const handleDelete = () => {
        setEvents(prev => prev.filter(e => e.id !== deleteId));
        setDeleteId(null);
      };

      return (
        <DarkModeProvider>
          <div className="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
            <Header onAdd={handleAdd} />

            <main className="max-w-6xl mx-auto px-4 py-6">
              {events.length > 0 && <StatsPanel events={events} />}

              {events.length > 0 && (
                <Toolbar
                  viewMode={viewMode} setViewMode={setViewMode}
                  sortBy={sortBy} setSortBy={setSortBy}
                  filterCategory={filterCategory} setFilterCategory={setFilterCategory}
                />
              )}

              {events.length === 0 ? (
                <EmptyState onAdd={handleAdd} />
              ) : displayedEvents.length === 0 ? (
                <div className="text-center py-16 text-gray-400 dark:text-gray-500">
                  <p className="text-lg">해당 카테고리에 이벤트가 없습니다</p>
                </div>
              ) : (
                <div className={viewMode === 'grid'
                  ? 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4'
                  : 'flex flex-col gap-3'
                }>
                  {displayedEvents.map(ev => (
                    <DDayCard
                      key={ev.id}
                      event={ev}
                      viewMode={viewMode}
                      onEdit={handleEdit}
                      onDelete={(id) => setDeleteId(id)}
                    />
                  ))}
                </div>
              )}
            </main>

            <Modal
              isOpen={modalOpen}
              onClose={() => { setModalOpen(false); setEditingEvent(null); }}
              title={editingEvent ? 'D-Day 수정' : 'D-Day 추가'}
            >
              <EventForm
                event={editingEvent}
                onSave={handleSave}
                onCancel={() => { setModalOpen(false); setEditingEvent(null); }}
              />
            </Modal>

            <ConfirmDialog
              isOpen={deleteId !== null}
              onClose={() => setDeleteId(null)}
              onConfirm={handleDelete}
              title="D-Day 삭제"
              message="이 D-Day를 삭제하시겠습니까? 삭제 후 복구할 수 없습니다."
            />
          </div>
        </DarkModeProvider>
      );
    }

    // ========================================
    // Render
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
