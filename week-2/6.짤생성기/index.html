<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>짤 생성기</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Black+Han+Sans&family=Bebas+Neue&family=Oswald:wght@400;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #F2F1EE;
      --surface:       #FAFAF8;
      --border:        #D4D3CE;
      --border-strong: #A8A7A2;
      --text:          #1A1916;
      --muted:         #7A7974;
      --subtle:        #C0BFB9;
      --accent:        #FFCD00;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
      font-size: 13px;
    }

    .mono { font-family: 'DM Mono', monospace; }

    .label {
      font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      display: block; margin-bottom: 6px;
    }

    /* ── Field ── */
    .field {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 13px;
      padding: 8px 10px; outline: none; transition: border-color 0.12s;
      border-radius: 0; -webkit-appearance: none;
    }
    .field:focus { border-color: var(--text); }
    select.field { cursor: pointer; }
    textarea.field { resize: vertical; line-height: 1.5; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit; font-size: 11px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      border: 1px solid transparent; outline: none; border-radius: 0;
      padding: 8px 14px; white-space: nowrap;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .btn-primary { background: var(--text); color: #FAFAF8; border-color: var(--text); }
    .btn-primary:hover { background: #2E2D2A; }
    .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { border-color: var(--border-strong); color: var(--text); }
    .btn-accent { background: var(--accent); color: var(--text); border-color: var(--accent); }
    .btn-accent:hover { background: #F0C200; }

    /* ── Toggle group ── */
    .toggle-group { display: flex; border: 1px solid var(--border); }
    .toggle-btn {
      flex: 1; padding: 7px 6px; font-family: inherit; font-size: 10px;
      font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; background: transparent; color: var(--muted);
      border: none; border-right: 1px solid var(--border);
      transition: background 0.12s, color 0.12s; outline: none;
    }
    .toggle-btn:last-child { border-right: none; }
    .toggle-btn.active { background: var(--text); color: #FAFAF8; }
    .toggle-btn:not(.active):hover { background: var(--bg); color: var(--text); }

    /* ── Section ── */
    .section { background: var(--surface); border: 1px solid var(--border); }
    .section + .section { border-top: none; }
    .section-header {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-title { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .section-body { padding: 14px; }

    /* ── Icon button ── */
    .icon-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer;
      font-size: 13px; transition: border-color 0.12s, color 0.12s, background 0.12s;
      outline: none;
    }
    .icon-btn.active { border-color: var(--text); background: var(--text); color: #FAFAF8; }
    .icon-btn:not(.active):hover { border-color: var(--border-strong); color: var(--text); }

    /* ── Layer item ── */
    .layer-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 10px; border: 1px solid var(--border); cursor: pointer;
      background: var(--surface); margin-bottom: 4px;
      transition: border-color 0.12s;
    }
    .layer-item:last-child { margin-bottom: 0; }
    .layer-item.selected { border-color: var(--text); }
    .layer-item:not(.selected):hover { border-color: var(--border-strong); }

    /* ── Drop zone ── */
    .drop-zone {
      border: 1px dashed var(--border); padding: 18px 10px; text-align: center;
      cursor: pointer; transition: border-color 0.12s, background 0.12s;
    }
    .drop-zone:hover, .drop-zone.over { border-color: var(--text); background: var(--bg); }

    /* ── Color input ── */
    .color-input { width: 30px; height: 30px; border: 1px solid var(--border); cursor: pointer; padding: 1px; background: none; }

    /* ── Range ── */
    input[type="range"] { accent-color: var(--text); width: 100%; cursor: pointer; }

    /* ── Divider ── */
    hr.div { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    /* ── Canvas stage ── */
    .canvas-stage {
      background: #0D0D0B;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      min-height: 200px;
    }
    canvas { display: block; max-width: 100%; max-height: calc(100vh - 180px); }

    /* ── Panel tabs ── */
    .panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .panel-tab {
      flex: 1; padding: 13px 4px;
      font-family: inherit; font-size: 10px; font-weight: 500;
      letter-spacing: 0.10em; text-transform: uppercase;
      cursor: pointer; background: var(--surface); color: var(--muted);
      border: none; border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.12s, border-color 0.12s; outline: none;
    }
    .panel-tab.active { color: var(--text); border-bottom-color: var(--text); }
    .panel-tab:not(.active):not(:disabled):hover { color: var(--text); }
    .panel-tab:disabled { opacity: 0.28; cursor: default; }

    /* ── Mode bar ── */
    .mode-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 12px;
    }
    .mode-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: inherit; font-size: 10px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 6px 12px; border: 1px solid var(--border); cursor: pointer;
      background: transparent; color: var(--muted); outline: none; transition: all 0.12s;
    }
    .mode-btn.active { background: var(--text); color: #FAFAF8; border-color: var(--text); }
    .mode-btn:not(.active):not(:disabled):hover { border-color: var(--border-strong); color: var(--text); }
    .mode-btn:disabled { opacity: 0.28; cursor: default; }

    /* Panel scroll area */
    .panel-scroll { flex: 1; overflow-y: auto; overscroll-behavior: contain; }
    .panel-scroll::-webkit-scrollbar { width: 3px; }
    .panel-scroll::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Grid ── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    /* ── Bubble shape picker ── */
    .bubble-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
    .bubble-btn {
      padding: 8px 4px; font-family: inherit; font-size: 10px; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
      background: transparent; color: var(--muted); border: 1px solid var(--border);
      outline: none; transition: background 0.12s, color 0.12s, border-color 0.12s;
      display: flex; flex-direction: column; align-items: center; gap: 3px; line-height: 1;
    }
    .bubble-btn .bicon { font-size: 15px; }
    .bubble-btn.active { background: var(--text); color: #FAFAF8; border-color: var(--text); }
    .bubble-btn:not(.active):hover { border-color: var(--border-strong); color: var(--text); }

    /* ── Sub-label (inside section) ── */
    .sub-label {
      font-size: 10px; font-weight: 500; letter-spacing: 0.10em;
      text-transform: uppercase; color: var(--text); margin-bottom: 8px; display: flex;
      align-items: center; justify-content: space-between;
    }
    .chk-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .chk-toggle input { accent-color: var(--text); width: 13px; height: 13px; cursor: pointer; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useRef, useEffect, useCallback } = React;

  // ── Constants ─────────────────────────────────────────────
  const SIZES = [
    { label: '1:1',  w: 800, h: 800  },
    { label: '16:9', w: 960, h: 540  },
    { label: '4:3',  w: 800, h: 600  },
    { label: '9:16', w: 540, h: 960  },
    { label: '3:4',  w: 600, h: 800  },
  ];

  const FONTS = [
    { value: 'Impact',           label: 'Impact'         },
    { value: '"Black Han Sans"', label: 'Black Han Sans'  },
    { value: '"Bebas Neue"',     label: 'Bebas Neue'     },
    { value: 'Oswald',           label: 'Oswald'         },
    { value: '"Noto Sans KR"',   label: 'Noto Sans KR'   },
    { value: '"Arial Black"',    label: 'Arial Black'    },
    { value: 'Georgia',          label: 'Georgia'        },
    { value: '"Courier New"',    label: 'Courier'        },
  ];

  const BG_PRESETS = ['#1A1916','#FFFFFF','#F2F1EE','#FF0000','#0057B7','#000000'];

  let _lid = 1;
  const makeLayer = (x = 0.5, y = 0.5) => ({
    id:          String(_lid++),
    text:        '텍스트',
    x, y,
    fontSize:    64,
    fontFamily:  'Impact',
    color:       '#FFFFFF',
    strokeWidth: 3,
    strokeColor: '#000000',
    align:       'center',
    bold:        false,
    italic:      false,
    uppercase:   false,
    // Drop shadow
    shadowEnabled:  false,
    shadowColor:    '#000000',
    shadowBlur:     10,
    shadowOffsetX:  4,
    shadowOffsetY:  4,
    // Text background
    textBgEnabled:  false,
    textBgColor:    '#000000',
    textBgOpacity:  0.65,
    textBgPadding:  14,
    textBgRadius:   0,
    // Speech bubble
    bubbleShape:    'none',   // none | speech | sharp | thought | shout | oval
    bubbleBgColor:  '#FFFFFF',
    bubbleBgOpacity: 1,
    bubbleBorderColor: '#1A1916',
    bubbleBorderWidth: 3,
    bubbleTailDir:  'bottom', // bottom | top | left | right
    bubblePadding:  24,
  });

  // ── Canvas drawing ─────────────────────────────────────────
  function fontStr(l) {
    return `${l.italic ? 'italic ' : ''}${l.bold ? 'bold ' : ''}${l.fontSize}px ${l.fontFamily}`;
  }

  function getTextBounds(ctx, layer, W, H) {
    const raw   = layer.uppercase ? layer.text.toUpperCase() : layer.text;
    const lines = raw.split('\n');
    ctx.font    = fontStr(layer);
    const lineH  = layer.fontSize * 1.28;
    const totalH = lines.length * lineH;
    const maxW   = lines.reduce((m, l) => Math.max(m, ctx.measureText(l).width), 1);
    const cx = layer.x * W, cy = layer.y * H;
    const x = layer.align === 'center' ? cx - maxW / 2
            : layer.align === 'right'  ? cx - maxW
            : cx;
    return { x, y: cy - totalH / 2, w: maxW, h: totalH, cx, cy };
  }

  function hitTest(ctx, mx, my, layers, W, H) {
    for (let i = layers.length - 1; i >= 0; i--) {
      const b = getTextBounds(ctx, layers[i], W, H);
      if (mx >= b.x - 10 && mx <= b.x + b.w + 10 &&
          my >= b.y -  8 && my <= b.y + b.h +  8) return layers[i].id;
    }
    return null;
  }

  // ── Drawing helpers ───────────────────────────────────────
  function hexToRgba(hex, alpha) {
    const h = hex.replace('#','');
    const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // Rounded-rect with optional tail (speech/sharp bubble)
  function speechBubblePath(ctx, bx, by, bw, bh, r, tailDir, tailSize, tailPos) {
    const tw = tailSize * 0.85, th = tailSize * 1.3;
    r = Math.max(0, Math.min(r, bw / 3, bh / 3));
    ctx.beginPath();
    if (tailDir === 'bottom') {
      const tx = bx + bw * tailPos;
      const tl = clamp(tx - tw, bx + r + 1, bx + bw - r - tw * 2 - 1);
      const tr = tl + tw * 2;
      ctx.moveTo(bx + r, by);
      ctx.lineTo(bx + bw - r, by);
      r > 0 ? ctx.arcTo(bx+bw,by,   bx+bw,by+r,   r) : ctx.lineTo(bx+bw,by);
      ctx.lineTo(bx+bw, by+bh-r);
      r > 0 ? ctx.arcTo(bx+bw,by+bh,bx+bw-r,by+bh,r) : ctx.lineTo(bx+bw,by+bh);
      ctx.lineTo(tr, by+bh); ctx.lineTo(tx, by+bh+th); ctx.lineTo(tl, by+bh);
      ctx.lineTo(bx + r, by+bh);
      r > 0 ? ctx.arcTo(bx,by+bh,bx,by+bh-r,r) : ctx.lineTo(bx,by+bh);
      ctx.lineTo(bx, by+r);
      r > 0 ? ctx.arcTo(bx,by,bx+r,by,r) : ctx.lineTo(bx,by);
    } else if (tailDir === 'top') {
      const tx = bx + bw * tailPos;
      const tl = clamp(tx - tw, bx + r + 1, bx + bw - r - tw * 2 - 1);
      const tr = tl + tw * 2;
      ctx.moveTo(bx + r, by);
      ctx.lineTo(tl, by); ctx.lineTo(tx, by-th); ctx.lineTo(tr, by);
      ctx.lineTo(bx+bw-r, by);
      r > 0 ? ctx.arcTo(bx+bw,by,   bx+bw,by+r,   r) : ctx.lineTo(bx+bw,by);
      ctx.lineTo(bx+bw, by+bh-r);
      r > 0 ? ctx.arcTo(bx+bw,by+bh,bx+bw-r,by+bh,r) : ctx.lineTo(bx+bw,by+bh);
      ctx.lineTo(bx+r, by+bh);
      r > 0 ? ctx.arcTo(bx,by+bh,bx,by+bh-r,r) : ctx.lineTo(bx,by+bh);
      ctx.lineTo(bx, by+r);
      r > 0 ? ctx.arcTo(bx,by,bx+r,by,r) : ctx.lineTo(bx,by);
    } else if (tailDir === 'left') {
      const ty = by + bh * tailPos;
      const tt = clamp(ty - tw, by + r + 1, by + bh - r - tw * 2 - 1);
      const tb = tt + tw * 2;
      ctx.moveTo(bx+r, by); ctx.lineTo(bx+bw-r, by);
      r > 0 ? ctx.arcTo(bx+bw,by,   bx+bw,by+r,   r) : ctx.lineTo(bx+bw,by);
      ctx.lineTo(bx+bw, by+bh-r);
      r > 0 ? ctx.arcTo(bx+bw,by+bh,bx+bw-r,by+bh,r) : ctx.lineTo(bx+bw,by+bh);
      ctx.lineTo(bx+r, by+bh);
      r > 0 ? ctx.arcTo(bx,by+bh,bx,by+bh-r,r) : ctx.lineTo(bx,by+bh);
      ctx.lineTo(bx, tb); ctx.lineTo(bx-th, ty); ctx.lineTo(bx, tt);
      ctx.lineTo(bx, by+r);
      r > 0 ? ctx.arcTo(bx,by,bx+r,by,r) : ctx.lineTo(bx,by);
    } else { // right
      const ty = by + bh * tailPos;
      const tt = clamp(ty - tw, by + r + 1, by + bh - r - tw * 2 - 1);
      const tb = tt + tw * 2;
      ctx.moveTo(bx+r, by); ctx.lineTo(bx+bw-r, by);
      r > 0 ? ctx.arcTo(bx+bw,by,bx+bw,by+r,r) : ctx.lineTo(bx+bw,by);
      ctx.lineTo(bx+bw, tt); ctx.lineTo(bx+bw+th, ty); ctx.lineTo(bx+bw, tb);
      ctx.lineTo(bx+bw, by+bh-r);
      r > 0 ? ctx.arcTo(bx+bw,by+bh,bx+bw-r,by+bh,r) : ctx.lineTo(bx+bw,by+bh);
      ctx.lineTo(bx+r, by+bh);
      r > 0 ? ctx.arcTo(bx,by+bh,bx,by+bh-r,r) : ctx.lineTo(bx,by+bh);
      ctx.lineTo(bx, by+r);
      r > 0 ? ctx.arcTo(bx,by,bx+r,by,r) : ctx.lineTo(bx,by);
    }
    ctx.closePath();
  }

  // Thought bubble: oval + shrinking dots
  function drawThoughtBubble(ctx, b, pad, layer) {
    const ecx = b.x + b.w/2, ecy = b.y + b.h/2;
    const erx = b.w/2 + pad, ery = b.h/2 + pad;
    ctx.fillStyle   = hexToRgba(layer.bubbleBgColor, layer.bubbleBgOpacity);
    ctx.strokeStyle = layer.bubbleBorderColor;
    ctx.lineWidth   = layer.bubbleBorderWidth;
    ctx.beginPath();
    ctx.ellipse(ecx, ecy, erx, ery, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // Dots
    const bw = layer.bubbleBorderWidth;
    const dirs = { bottom:[ecx+erx*0.3, ecy+ery, 7, 9], top:[ecx-erx*0.3, ecy-ery, -7, -9],
                   left:[ecx-erx, ecy+ery*0.3, -9, 7], right:[ecx+erx, ecy-ery*0.3, 9, -7] };
    const [dx, dy, ddx, ddy] = dirs[layer.bubbleTailDir] || dirs.bottom;
    [bw*2.5, bw*1.8, bw*1.2].forEach((r, i) => {
      ctx.beginPath();
      ctx.arc(dx + ddx*i*1.4, dy + ddy*i*1.4, Math.max(r,1), 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
    });
  }

  // Shout bubble: spiky star
  function drawShoutBubble(ctx, b, pad, layer) {
    const cx = b.x + b.w/2, cy = b.y + b.h/2;
    const inner = (Math.max(b.w, b.h)/2 + pad);
    const outer = inner * 1.40;
    const spikes = 14, step = Math.PI / spikes;
    ctx.fillStyle   = hexToRgba(layer.bubbleBgColor, layer.bubbleBgOpacity);
    ctx.strokeStyle = layer.bubbleBorderColor;
    ctx.lineWidth   = layer.bubbleBorderWidth;
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    for (let i = 0; i < spikes * 2; i++) {
      const r = i % 2 === 0 ? outer : inner;
      const a = i * step - Math.PI / 2;
      i === 0 ? ctx.moveTo(cx + r*Math.cos(a), cy + r*Math.sin(a))
              : ctx.lineTo(cx + r*Math.cos(a), cy + r*Math.sin(a));
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  // Oval bubble: ellipse + triangle tail
  function drawOvalBubble(ctx, b, pad, layer) {
    const bx = b.x-pad, by = b.y-pad, bw = b.w+pad*2, bh = b.h+pad*2;
    const ecx = bx+bw/2, ecy = by+bh/2, erx = bw/2, ery = bh/2;
    const ts = pad * 0.9;
    ctx.fillStyle   = hexToRgba(layer.bubbleBgColor, layer.bubbleBgOpacity);
    ctx.strokeStyle = layer.bubbleBorderColor;
    ctx.lineWidth   = layer.bubbleBorderWidth;
    ctx.beginPath();
    ctx.ellipse(ecx, ecy, erx, ery, 0, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    const tailMap = {
      bottom: [[ecx-ts/2, ecy+ery-2],[ecx+ts/2, ecy+ery-2],[ecx, ecy+ery+ts*1.4]],
      top:    [[ecx-ts/2, ecy-ery+2],[ecx+ts/2, ecy-ery+2],[ecx, ecy-ery-ts*1.4]],
      left:   [[ecx-erx+2, ecy-ts/2],[ecx-erx+2, ecy+ts/2],[ecx-erx-ts*1.4, ecy]],
      right:  [[ecx+erx-2, ecy-ts/2],[ecx+erx-2, ecy+ts/2],[ecx+erx+ts*1.4, ecy]],
    };
    const pts = tailMap[layer.bubbleTailDir] || tailMap.bottom;
    ctx.moveTo(pts[0][0], pts[0][1]); ctx.lineTo(pts[1][0], pts[1][1]); ctx.lineTo(pts[2][0], pts[2][1]);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  // Draw a single text layer
  function drawLayer(ctx, layer, W, H, isSelected) {
    ctx.save();
    const b = getTextBounds(ctx, layer, W, H);
    const pad = layer.bubblePadding;

    // ── 1. Speech bubble ──────────────────────────────────
    if (layer.bubbleShape !== 'none') {
      ctx.fillStyle   = hexToRgba(layer.bubbleBgColor, layer.bubbleBgOpacity);
      ctx.strokeStyle = layer.bubbleBorderColor;
      ctx.lineWidth   = layer.bubbleBorderWidth;
      ctx.lineJoin    = 'round';
      const bx = b.x-pad, by = b.y-pad, bw = b.w+pad*2, bh = b.h+pad*2;
      if (layer.bubbleShape === 'speech') {
        const r = Math.min(18, bh/3);
        speechBubblePath(ctx, bx, by, bw, bh, r, layer.bubbleTailDir, pad*0.85, 0.5);
        ctx.fill(); ctx.stroke();
      } else if (layer.bubbleShape === 'sharp') {
        speechBubblePath(ctx, bx, by, bw, bh, 0, layer.bubbleTailDir, pad*0.85, 0.5);
        ctx.fill(); ctx.stroke();
      } else if (layer.bubbleShape === 'thought') {
        drawThoughtBubble(ctx, b, pad, layer);
      } else if (layer.bubbleShape === 'shout') {
        drawShoutBubble(ctx, b, pad, layer);
      } else if (layer.bubbleShape === 'oval') {
        drawOvalBubble(ctx, b, pad, layer);
      }
    }

    // ── 2. Text background rect ───────────────────────────
    if (layer.textBgEnabled) {
      const tp = layer.textBgPadding;
      ctx.fillStyle = hexToRgba(layer.textBgColor, layer.textBgOpacity);
      ctx.beginPath();
      const tbx = b.x-tp, tby = b.y-tp*0.5, tbw = b.w+tp*2, tbh = b.h+tp;
      const tbr = layer.textBgRadius;
      if (tbr > 0) {
        const cr = Math.min(tbr, tbw/2, tbh/2);
        ctx.moveTo(tbx+cr, tby); ctx.lineTo(tbx+tbw-cr, tby);
        ctx.arcTo(tbx+tbw,tby,   tbx+tbw,tby+cr,   cr);
        ctx.lineTo(tbx+tbw, tby+tbh-cr);
        ctx.arcTo(tbx+tbw,tby+tbh,tbx+tbw-cr,tby+tbh,cr);
        ctx.lineTo(tbx+cr, tby+tbh);
        ctx.arcTo(tbx,tby+tbh,tbx,tby+tbh-cr,cr);
        ctx.lineTo(tbx, tby+cr);
        ctx.arcTo(tbx,tby,tbx+cr,tby,cr);
        ctx.closePath();
      } else {
        ctx.rect(tbx, tby, tbw, tbh);
      }
      ctx.fill();
    }

    // ── 3. Draw text ──────────────────────────────────────
    const raw   = layer.uppercase ? layer.text.toUpperCase() : layer.text;
    const lines = raw.split('\n');
    ctx.font         = fontStr(layer);
    ctx.textAlign    = layer.align;
    ctx.textBaseline = 'middle';
    const lineH  = layer.fontSize * 1.28;
    const totalH = lines.length * lineH;
    const startY = layer.y * H - totalH / 2 + lineH / 2;
    const x      = layer.x * W;

    lines.forEach((line, i) => {
      const y = startY + i * lineH;
      // Stroke first, no shadow
      if (layer.strokeWidth > 0) {
        ctx.save();
        ctx.shadowColor  = 'transparent';
        ctx.strokeStyle  = layer.strokeColor;
        ctx.lineWidth    = layer.strokeWidth * 2;
        ctx.lineJoin     = 'round';
        ctx.strokeText(line, x, y);
        ctx.restore();
      }
      // Fill with optional shadow
      if (layer.shadowEnabled) {
        ctx.shadowColor   = hexToRgba(layer.shadowColor, 0.85);
        ctx.shadowBlur    = layer.shadowBlur;
        ctx.shadowOffsetX = layer.shadowOffsetX;
        ctx.shadowOffsetY = layer.shadowOffsetY;
      }
      ctx.fillStyle = layer.color;
      ctx.fillText(line, x, y);
      ctx.shadowColor = 'transparent';
    });

    // ── 4. Selection ring ─────────────────────────────────
    if (isSelected) {
      const hasBubble = layer.bubbleShape !== 'none';
      const rx = hasBubble ? b.x-pad-10 : b.x-10;
      const ry = hasBubble ? b.y-pad-8  : b.y-8;
      const rw = hasBubble ? b.w+pad*2+20 : b.w+20;
      const rh = hasBubble ? b.h+pad*2+16 : b.h+16;
      ctx.strokeStyle = '#FFCD00'; ctx.lineWidth = 2;
      ctx.setLineDash([6, 3]);
      ctx.strokeRect(rx, ry, rw, rh);
      ctx.setLineDash([]);
      ctx.fillStyle = '#FFCD00';
      [[rx,ry],[rx+rw,ry],[rx,ry+rh],[rx+rw,ry+rh]].forEach(([hx,hy]) =>
        ctx.fillRect(hx-3,hy-3,6,6));
    }

    ctx.restore();
  }

  function renderCanvas(canvas, image, layers, bgColor, fitMode, selId, imgTransform) {
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // Background
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, W, H);

    // Image
    if (image) {
      const ir = image.naturalWidth / image.naturalHeight;
      const cr = W / H;
      const t  = imgTransform || { scale: 1, offsetX: 0, offsetY: 0 };
      // Base size (cover or contain)
      let baseDW, baseDH;
      if (fitMode === 'cover') {
        if (ir > cr) { baseDH = H; baseDW = baseDH * ir; }
        else         { baseDW = W; baseDH = baseDW / ir; }
      } else {
        if (ir > cr) { baseDW = W; baseDH = baseDW / ir; }
        else         { baseDH = H; baseDW = baseDH * ir; }
      }
      // Apply user transform
      const dw = baseDW * t.scale;
      const dh = baseDH * t.scale;
      const dx = (W - dw) / 2 + t.offsetX * W;
      const dy = (H - dh) / 2 + t.offsetY * H;
      ctx.drawImage(image, dx, dy, dw, dh);
    }

    // Layers
    layers.forEach(layer => drawLayer(ctx, layer, W, H, layer.id === selId));
  }

                    <input type="range" min={min} max={max} step={step}
                      value={layer[key]} onChange={e=>onChange(key, Number(e.target.value))} />
                    <span className="mono" style={{fontSize:10,color:'var(--muted)',minWidth:32,textAlign:'right'}}>
                      {key==='bubbleBgOpacity' ? Math.round(layer[key]*100)+'%' : layer[key]}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>

          <hr className="div" />

          {/* Position sliders */}
          <div>
            <span className="label">위치 (정밀 조정)</span>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span className="mono" style={{fontSize:10,color:'var(--muted)',width:10}}>X</span>
                <input type="range" min={0} max={1} step={0.005}
                  value={layer.x} onChange={e=>onChange('x', Number(e.target.value))} />
                <span className="mono" style={{fontSize:10,color:'var(--muted)',minWidth:32,textAlign:'right'}}>
                  {Math.round(layer.x * 100)}%
                </span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span className="mono" style={{fontSize:10,color:'var(--muted)',width:10}}>Y</span>
                <input type="range" min={0} max={1} step={0.005}
                  value={layer.y} onChange={e=>onChange('y', Number(e.target.value))} />
                <span className="mono" style={{fontSize:10,color:'var(--muted)',minWidth:32,textAlign:'right'}}>
                  {Math.round(layer.y * 100)}%
                </span>
              </div>
            </div>
          </div>

        </div>
      </div>
    );
  }

  // ── App ────────────────────────────────────────────────────
  function App() {
    const [image,        setImage]        = useState(null);
    const [bgColor,      setBgColor]      = useState('#1A1916');
    const [fitMode,      setFitMode]      = useState('cover');
    const [size,         setSize]         = useState(SIZES[1]); // 16:9
    const [layers,       setLayers]       = useState([]);
    const [selId,        setSelId]        = useState(null);
    const [grabbing,     setGrabbing]     = useState(false);
    const [imgTransform, setImgTransform] = useState({ scale: 1, offsetX: 0, offsetY: 0 });

    const canvasRef = useRef(null);
    const dragRef   = useRef(null); // { id, startX, startY, origX, origY }

    const selLayer = layers.find(l => l.id === selId) ?? null;

    // ── Redraw ──
    const redraw = useCallback(() => {
      renderCanvas(canvasRef.current, image, layers, bgColor, fitMode, selId, imgTransform);
    }, [image, layers, bgColor, fitMode, selId, imgTransform]);

    useEffect(() => { redraw(); }, [redraw]);
    // After fonts load, redraw (canvas doesn't auto-update on webfont load)
    useEffect(() => { document.fonts.ready.then(redraw); }, []);

    // ── Image load ──
    const loadFile = useCallback((file) => {
      if (!file?.type.startsWith('image/')) return;
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => { setImage(img); URL.revokeObjectURL(url); };
      img.onerror = () => URL.revokeObjectURL(url);
      img.src = url;
    }, []);

    // ── Canvas mouse ──
    const getCanvasPos = useCallback((e) => {
      const c = canvasRef.current;
      const r = c.getBoundingClientRect();
      return {
        x: (e.clientX - r.left) * (c.width  / r.width),
        y: (e.clientY - r.top)  * (c.height / r.height),
      };
    }, []);

    const onMouseDown = useCallback((e) => {
      const c   = canvasRef.current;
      const ctx = c.getContext('2d');
      const p   = getCanvasPos(e);
      const hit = hitTest(ctx, p.x, p.y, layers, c.width, c.height);
      if (hit) {
        const l = layers.find(x => x.id === hit);
        setSelId(hit);
        setGrabbing(true);
        dragRef.current = { id: hit, startX: p.x, startY: p.y, origX: l.x, origY: l.y };
      } else {
        setSelId(null);
      }
    }, [layers, getCanvasPos]);

    const onMouseMove = useCallback((e) => {
      if (!dragRef.current) return;
      const c = canvasRef.current;
      const p = getCanvasPos(e);
      const d = dragRef.current;
      setLayers(prev => prev.map(l =>
        l.id === d.id ? {
          ...l,
          x: Math.max(0, Math.min(1, d.origX + (p.x - d.startX) / c.width)),
          y: Math.max(0, Math.min(1, d.origY + (p.y - d.startY) / c.height)),
        } : l
      ));
    }, [getCanvasPos]);

    const onMouseUp = useCallback(() => {
      dragRef.current = null;
      setGrabbing(false);
    }, []);

    useEffect(() => {
      window.addEventListener('mouseup', onMouseUp);
      return () => window.removeEventListener('mouseup', onMouseUp);
    }, [onMouseUp]);

    // ── Keyboard shortcuts ──
    useEffect(() => {
      const onKey = (e) => {
        const tag = document.activeElement?.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        if ((e.key === 'Delete' || e.key === 'Backspace') && selId) {
          setLayers(prev => prev.filter(l => l.id !== selId));
          setSelId(null);
        }
        if (e.key === 'Escape') setSelId(null);
      };
      window.addEventListener('keydown', onKey);
      return () => window.removeEventListener('keydown', onKey);
    }, [selId]);

    // ── Layer actions ──
    const addLayer = () => {
      const yPos = layers.length === 0 ? 0.15 : layers.length === 1 ? 0.85 : 0.5;
      const l = makeLayer(0.5, yPos);
      setLayers(prev => [...prev, l]);
      setSelId(l.id);
    };

    const removeLayer = (id) => {
      setLayers(prev => prev.filter(l => l.id !== id));
      if (selId === id) setSelId(null);
    };

    const moveLayer = (i, dir) => {
      setLayers(prev => {
        const a = [...prev];
        const j = i + dir;
        if (j < 0 || j >= a.length) return a;
        [a[i], a[j]] = [a[j], a[i]];
        return a;
      });
    };

    const updateLayer = (id, key, val) =>
      setLayers(prev => prev.map(l => l.id === id ? { ...l, [key]: val } : l));

    // ── Download ──
    const download = () => {
      const c = canvasRef.current;
      renderCanvas(c, image, layers, bgColor, fitMode, null, imgTransform);
      const a = document.createElement('a');
      a.download = '짤.png';
      a.href = c.toDataURL('image/png');
      a.click();
      setTimeout(redraw, 60);
    };

    // ── Reset ──
    const reset = () => {
      setImage(null); setLayers([]); setSelId(null);
      setBgColor('#1A1916'); setFitMode('cover'); setSize(SIZES[1]);
      setImgTransform({ scale: 1, offsetX: 0, offsetY: 0 });
    };

    return (
      <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column'}}>

        {/* ── Header ── */}
        <header style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',position:'sticky',top:0,zIndex:20}}>
          <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px',height:52,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'baseline',gap:12}}>
              <span style={{fontWeight:500,fontSize:15,letterSpacing:'-0.02em'}}>짤 생성기</span>
              <span style={{fontSize:11,letterSpacing:'0.06em',color:'var(--muted)',textTransform:'uppercase'}}>Meme Generator</span>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <span style={{fontSize:10,color:'var(--subtle)',letterSpacing:'0.06em',textTransform:'uppercase',marginRight:4}}>
                Del — 레이어 삭제 · Esc — 선택 해제
              </span>
              <button className="btn btn-ghost" onClick={reset}>초기화</button>
              <button className="btn btn-accent" onClick={download}>PNG 저장</button>
            </div>
          </div>
        </header>

        {/* ── Layout ── */}
        <div style={{flex:1,maxWidth:1280,margin:'0 auto',width:'100%',padding:'20px 24px',display:'grid',gridTemplateColumns:'1fr 272px',gap:16,alignItems:'start'}}>

          {/* ── Canvas area ── */}
          <div>
            <div className="canvas-stage">
              <canvas
                ref={canvasRef}
                width={size.w}
                height={size.h}
                style={{cursor: grabbing ? 'grabbing' : layers.length ? 'crosshair' : 'default'}}
                onMouseDown={onMouseDown}
                onMouseMove={onMouseMove}
              />
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
              <span style={{fontSize:10,color:'var(--subtle)',letterSpacing:'0.06em',textTransform:'uppercase'}}>
                텍스트를 드래그하여 위치 조정
              </span>
              <span className="mono" style={{fontSize:10,color:'var(--subtle)'}}>
                {size.w} × {size.h} px
              </span>
            </div>
          </div>

          {/* ── Sidebar ── */}
          <div>
            <SizeSection size={size} onChange={setSize} />
            <BgSection bgColor={bgColor} onBgChange={setBgColor} />
            <ImageSection
              onLoad={loadFile} hasImage={!!image} onClear={() => { setImage(null); setImgTransform({ scale:1, offsetX:0, offsetY:0 }); }}
              imgTransform={imgTransform} onTransform={setImgTransform}
              fitMode={fitMode} onFitChange={setFitMode}
            />
            <LayerSection
              layers={layers} selId={selId}
              onSelect={setSelId} onAdd={addLayer} onRemove={removeLayer}
              onMoveUp={i => moveLayer(i, -1)}
              onMoveDown={i => moveLayer(i, 1)}
            />
            {selLayer && (
              <EditSection
                layer={selLayer}
                onChange={(k, v) => updateLayer(selLayer.id, k, v)}
              />
            )}
          </div>
        </div>

        <footer style={{textAlign:'center',padding:'24px 0',borderTop:'1px solid var(--border)',marginTop:40}}>
          <span style={{fontSize:10,letterSpacing:'0.10em',textTransform:'uppercase',color:'var(--subtle)'}}>
            Meme Generator · Canvas API · React 18
          </span>
        </footer>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
