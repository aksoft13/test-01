<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 생성기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg: #F2F1EE; --surface: #FAFAF8; --border: #D4D3CE; --border-strong: #A8A7A2;
      --text: #1A1916; --muted: #7A7974; --subtle: #C0BFB9; --accent: #FFCD00;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      font-size: 13px; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em;
      min-height: 100vh; overflow: hidden;
    }
    .label {
      font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); display: block; margin-bottom: 6px;
    }
    .field {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 10px;
      outline: none; border-radius: 0; transition: border-color 0.12s;
    }
    .field:focus { border-color: var(--text); }
    textarea.field { resize: vertical; line-height: 1.5; font-family: 'Noto Sans KR', sans-serif; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit; font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; cursor: pointer; border: 1px solid transparent;
      outline: none; border-radius: 0; padding: 8px 14px; white-space: nowrap;
      transition: background 0.12s, border-color 0.12s;
    }
    .btn-primary { background: var(--text); color: #FAFAF8; border-color: var(--text); }
    .btn-accent { background: var(--accent); color: var(--text); border-color: var(--accent); }
    .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { border-color: var(--border-strong); color: var(--text); }
    .toggle-group { display: flex; border: 1px solid var(--border); }
    .toggle-btn {
      flex: 1; padding: 7px 4px; font-family: inherit; font-size: 10px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      background: transparent; color: var(--muted); border: none;
      border-right: 1px solid var(--border); outline: none;
      transition: background 0.12s, color 0.12s;
    }
    .toggle-btn:last-child { border-right: none; }
    .toggle-btn.active { background: var(--text); color: #FAFAF8; }
    .toggle-btn:not(.active):hover { background: var(--bg); color: var(--text); }
    .section { background: var(--surface); border: 1px solid var(--border); }
    .section + .section { border-top: none; }
    .section-header {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-title {
      font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
    }
    .section-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
    input[type="range"] { accent-color: var(--text); width: 100%; cursor: pointer; }
    .chk-row { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .chk-row input { accent-color: var(--text); width: 13px; height: 13px; cursor: pointer; }
    .chk-row span { font-size: 12px; color: var(--text); }

    .app-header {
      height: 52px; border-bottom: 1px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
      flex-shrink: 0;
    }
    .sidebar {
      overflow-y: auto; padding: 16px; border-right: 1px solid var(--border);
      background: var(--bg);
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); }
    .stage-info {
      position: absolute; bottom: 16px; left: 0; right: 0; text-align: center;
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
      letter-spacing: 0.04em;
    }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-value {
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text);
      min-width: 36px; text-align: right; flex-shrink: 0;
    }
    .slider-track { flex: 1; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ========================================
    // Constants
    // ========================================
    const PAGE_SIZES = {
      A4:     { w: 210, h: 297 },
      Letter: { w: 215.9, h: 279.4 },
      A5:     { w: 148, h: 210 },
      Legal:  { w: 215.9, h: 355.6 },
    };
    const MM_TO_PX = 3.7795;
    const PAGE_SIZE_OPTIONS = ['A4', 'Letter', 'A5', 'Legal'];
    const ORIENTATION_OPTIONS = [
      { value: 'portrait', label: '세로' },
      { value: 'landscape', label: '가로' },
    ];

    const EMOJI_CATEGORIES = [
      { label: '얼굴', emojis: ['😀','😊','😂','🥰','😍','😎','🤔','😢','😭','😡','🤗','😴','🥳','😇','🤩','😏'] },
      { label: '하트', emojis: ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','💕','💞','💓','💗','💖','💝','💘','❣️'] },
      { label: '제스처', emojis: ['👍','👎','👋','🙌','👏','🤝','✌️','🤞','👌','🤙','💪','🙏','👐','🫶','🤜','🫵'] },
      { label: '축하', emojis: ['🎉','🎊','🎈','🥂','🍾','🎁','🎂','🏆','🥇','🎯','🎆','🎇','✨','🌟','💫','⭐'] },
      { label: '기호', emojis: ['✅','❌','⚠️','ℹ️','📌','📎','🔑','💡','📝','📊','📈','📉','🔔','📢','💬','🗒️'] },
      { label: '자연', emojis: ['🌸','🌺','🌻','🌷','🍀','🌿','🍁','🌊','⛅','🌈','🔥','⚡','🌙','☀️','❄️','🌍'] },
    ];

    // ========================================
    // Utility Functions
    // ========================================
    function formatDate() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return { display: `${y}년 ${m}월 ${d}일`, file: `${y}${m}${d}` };
    }

    function buildPages(settings, pageW_px, pageH_px, margin_px, fontSizePx, titleFontSizePx) {
      const contentH = pageH_px - margin_px * 2;
      const titleH = settings.title ? titleFontSizePx * settings.lineHeight + titleFontSizePx * 0.5 : 0;
      const bodyLineH = fontSizePx * settings.lineHeight;
      const pageNumberH = settings.showPageNumber ? fontSizePx * 1.8 : 0;
      const usableH = contentH - pageNumberH;
      const bodyLines = (settings.body || '').split('\n');

      const result = [];
      let pageLines = [];
      let y = settings.title ? titleH : 0;
      let pageIdx = 0;

      if (bodyLines.length === 0 || (bodyLines.length === 1 && bodyLines[0] === '')) {
        result.push({ lines: [], hasTitle: !!settings.title, pageNum: 1, totalPages: 1 });
        return result;
      }

      for (let i = 0; i < bodyLines.length; i++) {
        if (y + bodyLineH > usableH && pageLines.length > 0) {
          result.push({ lines: pageLines, hasTitle: pageIdx === 0 && !!settings.title, pageNum: pageIdx + 1 });
          pageIdx++;
          pageLines = [];
          y = 0;
        }
        pageLines.push(bodyLines[i]);
        y += bodyLineH;
      }
      result.push({ lines: pageLines, hasTitle: pageIdx === 0 && !!settings.title, pageNum: pageIdx + 1 });
      const totalPages = result.length;
      result.forEach(p => p.totalPages = totalPages);
      return result;
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function ToggleGroup({ options, value, onChange }) {
      return (
        <div className="toggle-group">
          {options.map(opt => {
            const val = typeof opt === 'string' ? opt : opt.value;
            const label = typeof opt === 'string' ? opt : opt.label;
            return (
              <button
                key={val}
                className={`toggle-btn ${value === val ? 'active' : ''}`}
                onClick={() => onChange(val)}
              >
                {label}
              </button>
            );
          })}
        </div>
      );
    }

    function SliderField({ label, value, onChange, min, max, step, unit }) {
      return (
        <div>
          <label className="label">{label}</label>
          <div className="slider-row">
            <div className="slider-track">
              <input
                type="range" min={min} max={max} step={step}
                value={value} onChange={e => onChange(Number(e.target.value))}
              />
            </div>
            <span className="slider-value">{value}{unit}</span>
          </div>
        </div>
      );
    }

    function CheckboxRow({ label, checked, onChange }) {
      return (
        <label className="chk-row">
          <input type="checkbox" checked={checked} onChange={e => onChange(e.target.checked)} />
          <span>{label}</span>
        </label>
      );
    }

    function Section({ title, children }) {
      return (
        <div className="section">
          <div className="section-header">
            <span className="section-title">{title}</span>
          </div>
          <div className="section-body">
            {children}
          </div>
        </div>
      );
    }

    // ========================================
    // 🎨 Signature Canvas Component
    // ========================================
    function SignatureCanvas({ canvasRef }) {
      const drawing = useRef(false);
      const lastPos = useRef(null);

      const getPos = (e, canvas) => {
        const r = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - r.left) * (canvas.width / r.width), y: (clientY - r.top) * (canvas.height / r.height) };
      };

      const drawBaseline = useCallback((ctx, canvas) => {
        ctx.setLineDash([4, 6]);
        ctx.strokeStyle = '#D4D3CE';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(10, canvas.height - 24);
        ctx.lineTo(canvas.width - 10, canvas.height - 24);
        ctx.stroke();
        ctx.setLineDash([]);
      }, []);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawBaseline(ctx, canvas);
        canvas._isEmpty = true;
      }, []);

      const startDraw = (e) => {
        e.preventDefault();
        drawing.current = true;
        const canvas = canvasRef.current;
        lastPos.current = getPos(e, canvas);
        canvas._isEmpty = false;
      };
      const draw = (e) => {
        if (!drawing.current) return;
        e.preventDefault();
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const pos = getPos(e, canvas);
        ctx.beginPath();
        ctx.moveTo(lastPos.current.x, lastPos.current.y);
        ctx.lineTo(pos.x, pos.y);
        ctx.strokeStyle = '#1A1916';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
        lastPos.current = pos;
      };
      const stopDraw = () => { drawing.current = false; };

      const clear = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drawBaseline(ctx, canvas);
        canvas._isEmpty = true;
      };

      return (
        <div>
          <canvas ref={canvasRef} width={308} height={120}
            style={{ border: '1px solid var(--border)', display: 'block', cursor: 'crosshair', touchAction: 'none', background: '#fff', width: '100%' }}
            onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
            onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw}
          />
          <button className="btn btn-ghost" style={{ width: '100%', marginTop: 6, fontSize: 10 }} onClick={clear}>
            지우기
          </button>
        </div>
      );
    }

    // ========================================
    // 🎨 Emoji Picker Component
    // ========================================
    function EmojiPicker({ show, onSelect, onClose, anchorRef }) {
      const pickerRef = useRef(null);

      useEffect(() => {
        if (!show) return;
        const handler = (e) => {
          if (pickerRef.current && !pickerRef.current.contains(e.target) &&
              anchorRef.current && !anchorRef.current.contains(e.target)) {
            onClose();
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [show, onClose]);

      if (!show) return null;

      return (
        <div ref={pickerRef} style={{
          position: 'absolute', top: '100%', right: 0, zIndex: 100,
          background: 'var(--surface)', border: '1px solid var(--border)',
          width: 300, maxHeight: 240, overflowY: 'auto', padding: 8,
        }}>
          {EMOJI_CATEGORIES.map(cat => (
            <div key={cat.label} style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 10, fontWeight: 500, color: 'var(--muted)', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 4 }}>
                {cat.emojis[0]} {cat.label}
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(8, 1fr)', gap: 2 }}>
                {cat.emojis.map((emoji, i) => (
                  <button key={i} onClick={() => onSelect(emoji)} style={{
                    background: 'none', border: 'none', fontSize: 18, cursor: 'pointer',
                    padding: 4, lineHeight: 1, borderRadius: 0,
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = 'var(--bg)'}
                    onMouseLeave={e => e.currentTarget.style.background = 'none'}
                  >
                    {emoji}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ========================================
    // 🎨 Email Modal Component
    // ========================================
    function EmailModal({ settings, onClose }) {
      const [to, setTo] = useState('');
      const [subject, setSubject] = useState(settings.title || '문서');
      const bodyPreview = (settings.body || '').slice(0, 200);

      const send = () => {
        const link = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(bodyPreview)}`;
        window.location.href = link;
      };

      return (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)', zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center' }}
          onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', padding: 24, width: 400 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
              <span style={{ fontWeight: 600, fontSize: 14 }}>이메일 전송</span>
              <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 18, cursor: 'pointer', color: 'var(--muted)' }}>×</button>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 20 }}>
              <div>
                <label className="label">받는 사람</label>
                <input className="field" type="email" placeholder="example@email.com" value={to} onChange={e => setTo(e.target.value)} />
              </div>
              <div>
                <label className="label">제목</label>
                <input className="field" type="text" value={subject} onChange={e => setSubject(e.target.value)} />
              </div>
              <div>
                <label className="label">본문 미리보기</label>
                <div style={{ background: 'var(--bg)', border: '1px solid var(--border)', padding: '8px 10px', fontSize: 12, color: 'var(--muted)', minHeight: 60, whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>
                  {bodyPreview || '(본문 없음)'}
                </div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
              <button className="btn btn-ghost" onClick={onClose}>취소</button>
              <button className="btn btn-primary" onClick={send}>이메일 앱 열기</button>
            </div>
            <p style={{ fontSize: 10, color: 'var(--subtle)', marginTop: 12, textAlign: 'center' }}>
              * PDF 파일은 이메일 앱에서 직접 첨부해 주세요
            </p>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 Preview Component
    // ========================================
    function Preview({ settings, sigCanvasRef, importedPdf, onSigMove }) {
      const stageRef = useRef(null);
      const [stageSize, setStageSize] = useState({ w: 600, h: 500 });

      useEffect(() => {
        const el = stageRef.current;
        if (!el) return;
        const obs = new ResizeObserver(entries => {
          const { width, height } = entries[0].contentRect;
          setStageSize({ w: width, h: height });
        });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);

      const dims = PAGE_SIZES[settings.pageSize];
      const isLandscape = settings.orientation === 'landscape';
      const pageW_mm = isLandscape ? dims.h : dims.w;
      const pageH_mm = isLandscape ? dims.w : dims.h;
      const pageW_px = pageW_mm * MM_TO_PX;
      const pageH_px = pageH_mm * MM_TO_PX;
      const margin_px = settings.margin * MM_TO_PX;

      const STAGE_PAD = 60;
      const scaleX = (stageSize.w - STAGE_PAD * 2) / pageW_px;
      const scaleY = (stageSize.h - STAGE_PAD * 2) / pageH_px;
      const scale = Math.min(scaleX, scaleY, 1.0);

      const fontSizePx = settings.fontSize * 1.333;
      const titleFontSizePx = fontSizePx * 1.6;

      const pages = useMemo(() =>
        buildPages(settings, pageW_px, pageH_px, margin_px, fontSizePx, titleFontSizePx),
        [settings, pageW_px, pageH_px, margin_px, fontSizePx, titleFontSizePx]
      );

      const orientLabel = isLandscape ? '가로' : '세로';
      const dimLabel = `${settings.pageSize} · ${Math.round(pageW_mm)} × ${Math.round(pageH_mm)}mm · ${orientLabel}`;

      // Get signature data URL for preview
      const sigDataUrl = useMemo(() => {
        if (!settings.signatureEnabled || !sigCanvasRef.current || sigCanvasRef.current._isEmpty) return null;
        try { return sigCanvasRef.current.toDataURL('image/png'); } catch(e) { return null; }
      }, [settings.signatureEnabled, settings]);

      // Drag state for signature repositioning
      const sigDragRef = useRef(null); // { startMx, startMy, startX, startY, pageW, pageH }

      const makeSigDragHandlers = (pageW_nat, pageH_nat, sc) => ({
        onMouseDown: (e) => {
          e.preventDefault(); e.stopPropagation();
          sigDragRef.current = {
            startMx: e.clientX, startMy: e.clientY,
            startX: settings.signatureX, startY: settings.signatureY,
            pageW: pageW_nat, pageH: pageH_nat, scale: sc,
          };
          const onMove = (ev) => {
            const d = sigDragRef.current;
            if (!d) return;
            const dx = (ev.clientX - d.startMx) / d.scale;
            const dy = (ev.clientY - d.startMy) / d.scale;
            const newX = Math.max(0, Math.min(100, d.startX + (dx / d.pageW) * 100));
            const newY = Math.max(0, Math.min(100, d.startY + (dy / d.pageH) * 100));
            onSigMove(Math.round(newX * 10) / 10, Math.round(newY * 10) / 10);
          };
          const onUp = () => { sigDragRef.current = null; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
        },
      });

      // ── Imported PDF preview ──
      if (importedPdf) {
        const totalPages = importedPdf.pages.length;
        return (
          <div ref={stageRef} style={{
            flex: 1, background: '#0D0D0B',
            display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center',
            overflow: 'auto', position: 'relative', padding: 40, gap: 8,
          }}>
            {importedPdf.pages.map((pg, idx) => {
              const pgScale = Math.min((stageSize.w - 80) / (pg.w / 2), 1.0);
              const isFirst = idx === 0, isLast = idx === totalPages - 1;
              const showSig = sigDataUrl && settings.signatureEnabled &&
                ((settings.signaturePage === 'first' && isFirst) || (settings.signaturePage === 'last' && isLast));
              const pgW_nat = pg.w / 2, pgH_nat = pg.h / 2;
              const sigW_px2 = settings.signatureSize * MM_TO_PX;
              const sigX_px2 = pgW_nat * settings.signatureX / 100;
              const sigY_px2 = pgH_nat * settings.signatureY / 100;
              const dragHandlers2 = makeSigDragHandlers(pgW_nat, pgH_nat, pgScale);
              return (
                <div key={idx} style={{ width: pgW_nat * pgScale, height: pgH_nat * pgScale, position: 'relative', flexShrink: 0 }}>
                  <div style={{ width: pgW_nat, height: pgH_nat, transform: `scale(${pgScale})`, transformOrigin: 'top left', position: 'absolute', top: 0, left: 0 }}>
                    <img src={pg.dataUrl} style={{ width: pgW_nat, height: pgH_nat, display: 'block' }} />
                    {showSig && (
                      <img src={sigDataUrl}
                        {...dragHandlers2}
                        style={{ position: 'absolute', left: sigX_px2, top: sigY_px2, width: sigW_px2, height: 'auto', cursor: 'move', userSelect: 'none', outline: '2px dashed #FFCD00' }}
                        draggable={false} title="드래그하여 위치 조정"
                      />
                    )}
                  </div>
                </div>
              );
            })}
            <div className="stage-info">{importedPdf.name} · {totalPages}페이지</div>
          </div>
        );
      }

      return (
        <div ref={stageRef} style={{
          flex: 1, background: '#0D0D0B',
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
          overflow: 'hidden', position: 'relative', padding: 40,
        }}>
          <div style={{
            display: 'flex', flexDirection: 'column', alignItems: 'center',
            gap: 8,
            maxHeight: '100%',
            overflowY: pages.length > 2 ? 'auto' : 'visible',
          }}>
            {pages.map((page, idx) => {
              const isFirst = idx === 0;
              const isLast = idx === pages.length - 1;
              const showSig = settings.signatureEnabled && sigDataUrl &&
                ((settings.signaturePage === 'first' && isFirst) || (settings.signaturePage === 'last' && isLast));

              return (
                <div key={idx} style={{
                  width: pageW_px * scale,
                  height: pageH_px * scale,
                  position: 'relative',
                  flexShrink: 0,
                }}>
                  <div style={{
                    width: pageW_px,
                    height: pageH_px,
                    transform: `scale(${scale})`,
                    transformOrigin: 'top left',
                    background: '#fff',
                    position: 'absolute',
                    top: 0, left: 0,
                    overflow: 'hidden',
                    fontFamily: "'Noto Sans KR', 'Inter', sans-serif",
                    padding: margin_px,
                  }}>
                    {/* Date */}
                    {isFirst && settings.showDate && (
                      <div style={{
                        position: 'absolute', top: margin_px, right: margin_px,
                        fontFamily: "'DM Mono', monospace",
                        fontSize: fontSizePx * 0.78, color: '#7A7974',
                      }}>
                        {formatDate().display}
                      </div>
                    )}

                    {/* Title */}
                    {page.hasTitle && (
                      <div style={{
                        fontSize: titleFontSizePx, fontWeight: 700, lineHeight: 1.3,
                        marginBottom: titleFontSizePx * 0.5, color: '#1A1916', wordBreak: 'break-word',
                      }}>
                        {settings.title}
                      </div>
                    )}

                    {/* Body */}
                    <div style={{
                      fontSize: fontSizePx, lineHeight: settings.lineHeight,
                      color: '#1A1916', whiteSpace: 'pre-wrap', wordBreak: 'break-word', overflow: 'hidden',
                    }}>
                      {page.lines.join('\n')}
                    </div>

                    {/* Signature — draggable */}
                    {showSig && (() => {
                      const sigW_px = settings.signatureSize * MM_TO_PX;
                      const sigX_px = pageW_px * settings.signatureX / 100;
                      const sigY_px = pageH_px * settings.signatureY / 100;
                      const dragHandlers = makeSigDragHandlers(pageW_px, pageH_px, scale);
                      return (
                        <img src={sigDataUrl}
                          {...dragHandlers}
                          style={{
                            position: 'absolute', left: sigX_px, top: sigY_px,
                            width: sigW_px, height: 'auto',
                            cursor: 'move', userSelect: 'none',
                            outline: '2px dashed #FFCD00',
                          }}
                          draggable={false}
                          title="드래그하여 위치 조정"
                        />
                      );
                    })()}

                    {/* Page number */}
                    {settings.showPageNumber && (
                      <div style={{
                        position: 'absolute', bottom: margin_px, left: 0, right: 0,
                        textAlign: 'center', fontFamily: "'DM Mono', monospace",
                        fontSize: fontSizePx * 0.78, color: '#7A7974',
                      }}>
                        {page.pageNum} / {page.totalPages}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
          <div className="stage-info">{dimLabel}</div>
        </div>
      );
    }

    // ========================================
    // 📥 PDF Generation (html2canvas)
    // ========================================
    async function generatePDF(settings, sigCanvas) {
      const { jsPDF } = window.jspdf;
      const dims = PAGE_SIZES[settings.pageSize];
      const isLandscape = settings.orientation === 'landscape';
      const pageW_mm = isLandscape ? dims.h : dims.w;
      const pageH_mm = isLandscape ? dims.w : dims.h;
      const pageW_px = pageW_mm * MM_TO_PX;
      const pageH_px = pageH_mm * MM_TO_PX;
      const margin_px = settings.margin * MM_TO_PX;
      const fontSizePx = settings.fontSize * 1.333;
      const titleFontSizePx = fontSizePx * 1.6;

      const pages = buildPages(settings, pageW_px, pageH_px, margin_px, fontSizePx, titleFontSizePx);

      const container = document.createElement('div');
      container.style.cssText = 'position:fixed;top:-99999px;left:-99999px;z-index:-9999;';
      document.body.appendChild(container);

      const doc = new jsPDF({
        orientation: isLandscape ? 'l' : 'p',
        unit: 'mm',
        format: [pageW_mm, pageH_mm],
      });

      for (let i = 0; i < pages.length; i++) {
        const page = pages[i];
        const isFirst = i === 0;
        const isLast = i === pages.length - 1;

        const pageEl = document.createElement('div');
        pageEl.style.cssText = `width:${pageW_px}px;height:${pageH_px}px;background:#fff;position:relative;font-family:'Noto Sans KR','Inter',sans-serif;overflow:hidden;padding:${margin_px}px;box-sizing:border-box;`;

        if (isFirst && settings.showDate) {
          const el = document.createElement('div');
          el.style.cssText = `position:absolute;top:${margin_px}px;right:${margin_px}px;font-size:${fontSizePx*0.78}px;color:#7A7974;font-family:'DM Mono',monospace;`;
          el.textContent = formatDate().display;
          pageEl.appendChild(el);
        }

        if (page.hasTitle) {
          const el = document.createElement('div');
          el.style.cssText = `font-size:${titleFontSizePx}px;font-weight:700;line-height:1.3;margin-bottom:${titleFontSizePx*0.5}px;color:#1A1916;word-break:break-word;`;
          el.textContent = settings.title;
          pageEl.appendChild(el);
        }

        const bodyEl = document.createElement('div');
        bodyEl.style.cssText = `font-size:${fontSizePx}px;line-height:${settings.lineHeight};color:#1A1916;white-space:pre-wrap;word-break:break-word;`;
        bodyEl.textContent = page.lines.join('\n');
        pageEl.appendChild(bodyEl);

        // Signature
        if (settings.signatureEnabled && sigCanvas && !sigCanvas._isEmpty) {
          const sigOnPage = (settings.signaturePage === 'first' && isFirst) || (settings.signaturePage === 'last' && isLast);
          if (sigOnPage) {
            const sigEl = document.createElement('img');
            sigEl.src = sigCanvas.toDataURL('image/png');
            const sigW_px = settings.signatureSize * MM_TO_PX;
            const sigX_px = pageW_px * settings.signatureX / 100;
            const sigY_px = pageH_px * settings.signatureY / 100;
            sigEl.style.cssText = `position:absolute;left:${sigX_px}px;top:${sigY_px}px;width:${sigW_px}px;height:auto;`;
            pageEl.appendChild(sigEl);
          }
        }

        if (settings.showPageNumber) {
          const el = document.createElement('div');
          el.style.cssText = `position:absolute;bottom:${margin_px}px;left:0;right:0;text-align:center;font-size:${fontSizePx*0.78}px;color:#7A7974;font-family:'DM Mono',monospace;`;
          el.textContent = `${page.pageNum} / ${page.totalPages}`;
          pageEl.appendChild(el);
        }

        container.appendChild(pageEl);
        await document.fonts.ready;

        const canvas = await html2canvas(pageEl, {
          scale: 2, useCORS: true, backgroundColor: '#ffffff',
          width: pageW_px, height: pageH_px, logging: false,
        });
        if (i > 0) doc.addPage([pageW_mm, pageH_mm]);
        doc.addImage(canvas.toDataURL('image/jpeg', 0.96), 'JPEG', 0, 0, pageW_mm, pageH_mm);
        container.removeChild(pageEl);
      }

      document.body.removeChild(container);
      doc.save(`문서_${formatDate().file}.pdf`);
    }

    // ========================================
    // 📥 PDF From Import (signature on uploaded PDF)
    // ========================================
    async function generatePDFFromImport(importedPdf, settings, sigCanvas) {
      const { jsPDF } = window.jspdf;
      const hasSig = settings.signatureEnabled && sigCanvas && !sigCanvas._isEmpty;
      const totalPages = importedPdf.pages.length;

      // Use first page dims for PDF format
      const firstPage = importedPdf.pages[0];
      const pdfW_mm = firstPage.w / 2 / MM_TO_PX;
      const pdfH_mm = firstPage.h / 2 / MM_TO_PX;

      const doc = new jsPDF({ orientation: pdfW_mm > pdfH_mm ? 'l' : 'p', unit: 'mm', format: [pdfW_mm, pdfH_mm] });

      const sigDataUrl = hasSig ? sigCanvas.toDataURL('image/png') : null;
      const sigW_mm = settings.signatureSize;
      const sigH_mm = sigW_mm * (sigCanvas.height / sigCanvas.width);

      for (let i = 0; i < totalPages; i++) {
        const pg = importedPdf.pages[i];
        const pgW_mm = pg.w / 2 / MM_TO_PX;
        const pgH_mm = pg.h / 2 / MM_TO_PX;

        if (i > 0) doc.addPage([pgW_mm, pgH_mm]);
        doc.addImage(pg.dataUrl, 'JPEG', 0, 0, pgW_mm, pgH_mm);

        if (hasSig) {
          const isFirst = i === 0, isLast = i === totalPages - 1;
          const sigOnPage = (settings.signaturePage === 'first' && isFirst) || (settings.signaturePage === 'last' && isLast);
          if (sigOnPage) {
            const sigX_mm = pgW_mm * settings.signatureX / 100;
            const sigY_mm = pgH_mm * settings.signatureY / 100;
            doc.addImage(sigDataUrl, 'PNG', sigX_mm, sigY_mm, sigW_mm, sigH_mm);
          }
        }
      }

      doc.save(`서명_${importedPdf.name.replace('.pdf','')}_${formatDate().file}.pdf`);
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [settings, setSettings] = useState({
        pageSize: 'A4',
        orientation: 'portrait',
        margin: 20,
        fontSize: 12,
        lineHeight: 1.6,
        title: '',
        body: '',
        showPageNumber: true,
        showDate: true,
        signatureEnabled: false,
        signaturePage: 'last',
        signatureSize: 60,    // mm
        signatureX: 70,       // % from left (0–100)
        signatureY: 80,       // % from top  (0–100)
      });
      const [saving, setSaving] = useState(false);
      const [showEmailModal, setShowEmailModal] = useState(false);
      const [showEmoji, setShowEmoji] = useState(false);
      const [importedPdf, setImportedPdf] = useState(null); // { pages:[{dataUrl,w,h}], name }
      const [pdfLoading, setPdfLoading] = useState(false);
      const sigCanvasRef = useRef(null);
      const textareaRef = useRef(null);
      const emojiBtnRef = useRef(null);
      const pdfFileRef = useRef(null);

      const update = useCallback((key, val) => {
        setSettings(prev => ({ ...prev, [key]: val }));
      }, []);

      const loadPdfFile = useCallback(async (file) => {
        if (!file || file.type !== 'application/pdf') return;
        setPdfLoading(true);
        try {
          const pdfjsLib = window['pdfjs-dist/build/pdf'];
          pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          const pageList = [];
          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2 });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            pageList.push({ dataUrl: canvas.toDataURL('image/jpeg', 0.92), w: viewport.width, h: viewport.height });
          }
          setImportedPdf({ pages: pageList, name: file.name });
        } catch(e) {
          alert('PDF를 불러오는 중 오류가 발생했습니다.');
        } finally {
          setPdfLoading(false);
        }
      }, []);

      const handleSave = useCallback(async () => {
        setSaving(true);
        try {
          if (importedPdf) {
            await generatePDFFromImport(importedPdf, settings, sigCanvasRef.current);
          } else {
            await generatePDF(settings, sigCanvasRef.current);
          }
        } finally {
          setSaving(false);
        }
      }, [settings, importedPdf]);

      const insertEmoji = useCallback((emoji) => {
        const ta = textareaRef.current;
        if (!ta) return;
        const start = ta.selectionStart;
        const end = ta.selectionEnd;
        const before = settings.body.substring(0, start);
        const after = settings.body.substring(end);
        const newBody = before + emoji + after;
        update('body', newBody);
        setTimeout(() => {
          ta.focus();
          ta.setSelectionRange(start + emoji.length, start + emoji.length);
        }, 0);
        setShowEmoji(false);
      }, [settings.body, update]);

      return (
        <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          {/* Header */}
          <header className="app-header">
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
              <span style={{ fontSize: 14, fontWeight: 600, letterSpacing: '-0.02em' }}>
                PDF 생성기
              </span>
              <span style={{ fontSize: 11, color: 'var(--muted)', fontWeight: 400 }}>
                PDF Generator
              </span>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-ghost" onClick={() => setShowEmailModal(true)}>
                이메일 전송
              </button>
              <button className="btn btn-accent" onClick={handleSave} disabled={saving}
                style={{ opacity: saving ? 0.6 : 1, cursor: saving ? 'default' : 'pointer' }}>
                {saving ? '생성 중...' : 'PDF 저장'}
              </button>
            </div>
          </header>

          {/* Email Modal */}
          {showEmailModal && <EmailModal settings={settings} onClose={() => setShowEmailModal(false)} />}

          {/* Main Layout */}
          <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '340px 1fr', overflow: 'hidden' }}>
            {/* Sidebar */}
            <div className="sidebar">
              {/* 문서 설정 */}
              <Section title="문서 설정">
                <div>
                  <label className="label">페이지 크기</label>
                  <ToggleGroup options={PAGE_SIZE_OPTIONS} value={settings.pageSize} onChange={v => update('pageSize', v)} />
                </div>
                <div>
                  <label className="label">방향</label>
                  <ToggleGroup options={ORIENTATION_OPTIONS} value={settings.orientation} onChange={v => update('orientation', v)} />
                </div>
                <SliderField label="여백" value={settings.margin} onChange={v => update('margin', v)} min={10} max={60} step={1} unit="mm" />
                <SliderField label="폰트 크기" value={settings.fontSize} onChange={v => update('fontSize', v)} min={8} max={32} step={1} unit="pt" />
                <SliderField label="줄 간격" value={settings.lineHeight} onChange={v => update('lineHeight', v)} min={1.0} max={3.0} step={0.1} unit="" />
              </Section>

              {/* 내용 */}
              <Section title="내용">
                <div>
                  <label className="label">제목 (선택)</label>
                  <input type="text" className="field" placeholder="문서 제목을 입력하세요"
                    value={settings.title} onChange={e => update('title', e.target.value)} />
                </div>
                <div style={{ position: 'relative' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                    <label className="label" style={{ marginBottom: 0 }}>본문</label>
                    <button ref={emojiBtnRef} onClick={() => setShowEmoji(!showEmoji)} style={{
                      background: 'none', border: '1px solid var(--border)', cursor: 'pointer',
                      fontSize: 16, padding: '2px 6px', lineHeight: 1, color: 'var(--muted)',
                    }}
                      title="이모지 삽입"
                    >
                      😀
                    </button>
                  </div>
                  <textarea ref={textareaRef} className="field" rows={12}
                    placeholder={"내용을 입력하세요.\n여러 줄을 입력하면 자동으로 다음 페이지로 넘어갑니다."}
                    value={settings.body}
                    onChange={e => update('body', e.target.value)}
                  />
                  <EmojiPicker show={showEmoji} onSelect={insertEmoji} onClose={() => setShowEmoji(false)} anchorRef={emojiBtnRef} />
                </div>
                <CheckboxRow label="페이지 번호 표시" checked={settings.showPageNumber} onChange={v => update('showPageNumber', v)} />
                <CheckboxRow label="날짜 표시" checked={settings.showDate} onChange={v => update('showDate', v)} />
              </Section>

              {/* 서명 */}
              <Section title="서명">
                <SignatureCanvas canvasRef={sigCanvasRef} />
                <CheckboxRow label="서명을 PDF에 포함하기" checked={settings.signatureEnabled} onChange={v => update('signatureEnabled', v)} />
                {settings.signatureEnabled && (
                  <>
                    <div>
                      <label className="label">페이지</label>
                      <ToggleGroup
                        options={[{ value: 'first', label: '첫 페이지' }, { value: 'last', label: '마지막 페이지' }]}
                        value={settings.signaturePage}
                        onChange={v => update('signaturePage', v)}
                      />
                    </div>
                    <SliderField label="서명 너비" value={settings.signatureSize} onChange={v => update('signatureSize', v)} min={10} max={150} step={1} unit="mm" />
                    <div>
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
                        <label className="label" style={{marginBottom:0}}>가로 위치 (X)</label>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'var(--text)'}}>{settings.signatureX.toFixed(1)}%</span>
                      </div>
                      <input type="range" min={0} max={100} step={0.5}
                        value={settings.signatureX} onChange={e => update('signatureX', Number(e.target.value))} />
                    </div>
                    <div>
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
                        <label className="label" style={{marginBottom:0}}>세로 위치 (Y)</label>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:'var(--text)'}}>{settings.signatureY.toFixed(1)}%</span>
                      </div>
                      <input type="range" min={0} max={100} step={0.5}
                        value={settings.signatureY} onChange={e => update('signatureY', Number(e.target.value))} />
                    </div>
                    {/* Position presets */}
                    <div>
                      <label className="label">위치 프리셋</label>
                      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:4 }}>
                        {[
                          { label:'좌상', x:2,  y:5  },
                          { label:'중상', x:38, y:5  },
                          { label:'우상', x:72, y:5  },
                          { label:'좌하', x:2,  y:82 },
                          { label:'중하', x:38, y:82 },
                          { label:'우하', x:72, y:82 },
                        ].map(p => (
                          <button key={p.label}
                            className="btn btn-ghost"
                            style={{ fontSize:10, padding:'5px 2px' }}
                            onClick={() => { update('signatureX', p.x); update('signatureY', p.y); }}>
                            {p.label}
                          </button>
                        ))}
                      </div>
                    </div>
                    <p style={{fontSize:10,color:'var(--subtle)'}}>* 미리보기에서 서명을 드래그해도 위치가 조정됩니다</p>
                  </>
                )}
              </Section>

              {/* PDF 첨부 */}
              <Section title="PDF 첨부">
                <div>
                  <p style={{ fontSize: 11, color: 'var(--muted)', lineHeight: 1.5, marginBottom: 8 }}>
                    기존 PDF를 불러와서 서명을 삽입한 후 저장할 수 있습니다.
                  </p>
                  <input ref={pdfFileRef} type="file" accept="application/pdf" style={{ display: 'none' }}
                    onChange={e => { if (e.target.files[0]) loadPdfFile(e.target.files[0]); e.target.value = ''; }} />
                  <button className="btn btn-ghost" style={{ width: '100%' }}
                    onClick={() => pdfFileRef.current.click()} disabled={pdfLoading}>
                    {pdfLoading ? '불러오는 중...' : 'PDF 파일 열기'}
                  </button>
                  {importedPdf && (
                    <div style={{ marginTop: 8, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
                      <div style={{ fontSize: 11, color: 'var(--text)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>
                        📄 {importedPdf.name}
                        <span style={{ color: 'var(--muted)', marginLeft: 6 }}>{importedPdf.pages.length}p</span>
                      </div>
                      <button className="btn btn-ghost" style={{ fontSize: 10, padding: '4px 8px', flexShrink: 0 }}
                        onClick={() => setImportedPdf(null)}>닫기</button>
                    </div>
                  )}
                  {importedPdf && (
                    <p style={{ fontSize: 10, color: 'var(--subtle)', marginTop: 6 }}>
                      * PDF 저장 시 서명이 포함된 새 파일로 저장됩니다
                    </p>
                  )}
                </div>
              </Section>
            </div>

            {/* Preview */}
            <Preview settings={settings} sigCanvasRef={sigCanvasRef} importedPdf={importedPdf}
              onSigMove={(x, y) => { update('signatureX', x); update('signatureY', y); }} />
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
