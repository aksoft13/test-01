<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Tags - A Visual Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --white: #F5F5F0;
      --black: #1A1A1A;
      --gray: #888888;
      --gray-light: #E8E8E3;
      --gray-subtle: #D0D0CB;
      --accent: #E63329;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --mono: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', Consolas, monospace;
    }

    html, body, #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
      background: var(--accent);
      color: #fff;
    }

    /* Slide transitions */
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: translateX(30px);
      transition: opacity 0.45s cubic-bezier(0.25, 0.1, 0.25, 1),
                  transform 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 10vw 120px;
      overflow-y: auto;
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .slide.exit-left {
      opacity: 0;
      transform: translateX(-30px);
    }

    .slide.exit-right {
      opacity: 0;
      transform: translateX(30px);
    }

    /* Slide number */
    .slide-number {
      position: absolute;
      top: 40px;
      right: 10vw;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--gray);
      letter-spacing: 0.05em;
    }

    /* Tag name */
    .tag-name {
      font-size: clamp(44px, 6.5vw, 88px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 14px;
      color: var(--black);
    }

    .tag-name .bracket {
      color: var(--gray-subtle);
      font-weight: 300;
    }

    /* Description */
    .description {
      font-size: 17px;
      font-weight: 400;
      color: var(--gray);
      margin-bottom: 40px;
      line-height: 1.5;
    }

    /* Two-column layout for example + code */
    .content-row {
      display: flex;
      gap: 24px;
      max-width: 820px;
    }

    @media (max-width: 768px) {
      .content-row {
        flex-direction: column;
      }
    }

    /* Example area */
    .example-area {
      flex: 1;
      padding: 28px;
      border: 1px solid var(--gray-light);
      border-radius: 2px;
      background: #FAFAF6;
      min-width: 0;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gray);
      margin-bottom: 14px;
    }

    /* Code block */
    .code-block {
      flex: 1;
      background: var(--black);
      color: #CCCCC6;
      padding: 28px;
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.75;
      min-width: 0;
      overflow-x: auto;
      white-space: pre;
    }

    /* Progress bar */
    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--gray-light);
      z-index: 100;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    /* Navigation */
    .nav {
      position: fixed;
      bottom: 20px;
      left: 10vw;
      right: 10vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }

    .nav-buttons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--gray-subtle);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
      transition: border-color 0.2s, opacity 0.2s;
      color: var(--black);
    }

    .nav-btn:hover:not(:disabled) {
      border-color: var(--black);
    }

    .nav-btn:disabled {
      opacity: 0.2;
      cursor: default;
    }

    .nav-btn svg {
      width: 14px;
      height: 14px;
    }

    .nav-hint {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--gray);
      letter-spacing: 0.02em;
    }

    /* Example content styles */
    .ex h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.02em; color: var(--black); }
    .ex h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.01em; color: var(--black); }
    .ex h3 { font-size: 16px; font-weight: 500; color: #444; }

    .ex p {
      font-size: 14px;
      line-height: 1.7;
      color: #555;
    }

    .ex ul, .ex ol {
      padding-left: 18px;
      font-size: 14px;
      line-height: 1.9;
      color: #555;
    }

    .ex a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .ex a:hover {
      border-bottom-color: var(--accent);
    }

    .ex button {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      padding: 9px 22px;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.01em;
    }

    .ex button:hover {
      opacity: 0.8;
    }

    .span-hl {
      background: rgba(230, 51, 41, 0.1);
      padding: 1px 5px;
      border-radius: 2px;
      font-weight: 500;
      color: var(--accent);
    }

    .demo-div {
      border: 1px dashed var(--gray-subtle);
      padding: 14px;
      font-size: 13px;
      font-family: var(--mono);
      color: var(--gray);
    }

    .semantic-box {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--gray);
    }

    .semantic-box > div {
      border: 1px solid var(--gray-light);
      padding: 8px 12px;
      margin-bottom: -1px;
    }

    .s-header { background: rgba(230, 51, 41, 0.05); }
    .s-main { background: rgba(0, 87, 255, 0.03); min-height: 40px; }
    .s-section { background: rgba(0, 87, 255, 0.02); margin: 6px 0 0 14px !important; }
    .s-footer { background: rgba(0, 0, 0, 0.025); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useCallback } = React;

    // ========================================
    // Slide Data
    // ========================================
    const slides = [
      {
        title: 'h1 ~ h3',
        description: '문서의 제목과 부제목을 정의하는 heading 태그입니다.',
        example: () => (
          <div className="ex">
            <h1>Heading 1</h1>
            <h2>Heading 2</h2>
            <h3>Heading 3</h3>
          </div>
        ),
        code: `<h1>Heading 1</h1>\n<h2>Heading 2</h2>\n<h3>Heading 3</h3>`
      },
      {
        title: 'p',
        description: '하나의 문단(paragraph)을 나타내는 블록 요소입니다.',
        example: () => (
          <div className="ex">
            <p>
              좋은 디자인은 가능한 한 적게 디자인하는 것이다.
              적을수록, 그러나 더 나은 것 &mdash; 본질적인 측면에
              집중하기 때문이다.
            </p>
          </div>
        ),
        code: `<p>\n  좋은 디자인은 가능한 한\n  적게 디자인하는 것이다.\n  Less, but better.\n</p>`
      },
      {
        title: 'span',
        description: '텍스트의 일부를 감싸는 인라인 요소로, 스타일 적용에 사용됩니다.',
        example: () => (
          <div className="ex">
            <p>
              이 문장에서 <span className="span-hl">이 부분만</span> 강조할 수 있습니다.
            </p>
          </div>
        ),
        code: `<p>\n  이 문장에서\n  <span style="color: red">\n    이 부분만\n  </span>\n  강조할 수 있습니다.\n</p>`
      },
      {
        title: 'ul / ol / li',
        description: '순서 없는 목록(ul), 순서 있는 목록(ol), 그리고 목록 항목(li)입니다.',
        example: () => (
          <div className="ex" style={{ display: 'flex', gap: '40px' }}>
            <div>
              <div className="section-label" style={{ marginBottom: '6px' }}>unordered</div>
              <ul>
                <li>디자인</li>
                <li>개발</li>
                <li>배포</li>
              </ul>
            </div>
            <div>
              <div className="section-label" style={{ marginBottom: '6px' }}>ordered</div>
              <ol>
                <li>기획</li>
                <li>구현</li>
                <li>테스트</li>
              </ol>
            </div>
          </div>
        ),
        code: `<ul>            <ol>\n  <li>디자인</li>    <li>기획</li>\n  <li>개발</li>      <li>구현</li>\n  <li>배포</li>      <li>테스트</li>\n</ul>           </ol>`
      },
      {
        title: 'a',
        description: '다른 페이지나 리소스로 연결하는 하이퍼링크를 만듭니다.',
        example: () => (
          <div className="ex">
            <a href="https://developer.mozilla.org" target="_blank" rel="noopener noreferrer">
              MDN Web Docs 방문하기 &rarr;
            </a>
          </div>
        ),
        code: `<a href="https://developer.mozilla.org"\n   target="_blank">\n  MDN Web Docs 방문하기\n</a>`
      },
      {
        title: 'img',
        description: '문서에 이미지를 삽입하는 빈 요소(self-closing)입니다.',
        example: () => (
          <div className="ex">
            <img
              src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=480&h=200&fit=crop&crop=center&auto=format&q=80"
              alt="Minimal architecture"
              style={{ width: '100%', maxWidth: '360px', height: '120px', objectFit: 'cover', display: 'block' }}
            />
            <div style={{ fontSize: '11px', fontFamily: 'var(--mono)', color: 'var(--gray)', marginTop: '6px' }}>
              480 x 200 &mdash; Unsplash
            </div>
          </div>
        ),
        code: `<img\n  src="photo.jpg"\n  alt="설명 텍스트"\n  width="480"\n  height="200"\n/>`
      },
      {
        title: 'button',
        description: '클릭 가능한 버튼 요소로, 사용자 인터랙션을 처리합니다.',
        example: () => {
          const [count, setCount] = useState(0);
          return (
            <div className="ex" style={{ display: 'flex', alignItems: 'center', gap: '14px' }}>
              <button onClick={() => setCount(c => c + 1)}>
                Click me
              </button>
              <span style={{ fontFamily: 'var(--mono)', fontSize: '13px', color: 'var(--gray)' }}>
                count: {count}
              </span>
            </div>
          );
        },
        code: `<button onclick="handleClick()">\n  Click me\n</button>`
      },
      {
        title: 'div',
        description: '범용 블록 컨테이너로, 콘텐츠를 그룹화하고 레이아웃을 구성합니다.',
        example: () => (
          <div className="ex">
            <div className="demo-div">
              &lt;div&gt; container
              <div style={{ border: '1px dashed var(--gray-subtle)', padding: '10px', marginTop: '8px', marginLeft: '14px' }}>
                &lt;div&gt; nested child
              </div>
            </div>
          </div>
        ),
        code: `<div class="container">\n  <div class="child">\n    중첩된 콘텐츠\n  </div>\n</div>`
      },
      {
        title: 'Semantic',
        description: '문서 구조에 의미를 부여하는 시맨틱 레이아웃 태그입니다.',
        example: () => (
          <div className="ex">
            <div className="semantic-box">
              <div className="s-header">&lt;header&gt;</div>
              <div className="s-main">
                &lt;main&gt;
                <div className="s-section">&lt;section&gt; ... &lt;/section&gt;</div>
              </div>
              <div className="s-footer">&lt;footer&gt;</div>
            </div>
          </div>
        ),
        code: `<header>...</header>\n<main>\n  <section>...</section>\n</main>\n<footer>...</footer>`
      }
    ];

    // ========================================
    // Slide Component
    // ========================================
    function Slide({ data, index, total, state }) {
      const Example = data.example;
      const slideNum = String(index + 1).padStart(2, '0');
      const totalNum = String(total).padStart(2, '0');

      let className = 'slide';
      if (state === 'active') className = 'slide active';
      else if (state === 'exit-left') className = 'slide exit-left';
      else if (state === 'exit-right') className = 'slide exit-right';

      return (
        <div className={className} aria-hidden={state !== 'active'}>
          <div className="slide-number">
            {slideNum} / {totalNum}
          </div>

          <div className="tag-name">
            <span className="bracket">&lt;</span>
            {data.title}
            <span className="bracket">&gt;</span>
          </div>

          <div className="description">{data.description}</div>

          <div className="content-row">
            <div className="example-area">
              <div className="section-label">Example</div>
              <Example />
            </div>

            <div style={{ flex: 1, minWidth: 0 }}>
              <div className="section-label" style={{ color: '#666', marginBottom: '14px' }}>Code</div>
              <div className="code-block">{data.code}</div>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [current, setCurrent] = useState(0);
      const [prev, setPrev] = useState(null);
      const [direction, setDirection] = useState('right');
      const total = slides.length;

      const goNext = useCallback(() => {
        if (current < total - 1) {
          setDirection('right');
          setPrev(current);
          setCurrent(c => c + 1);
        }
      }, [current, total]);

      const goPrev = useCallback(() => {
        if (current > 0) {
          setDirection('left');
          setPrev(current);
          setCurrent(c => c - 1);
        }
      }, [current]);

      // Keyboard navigation
      useEffect(() => {
        function handleKeyDown(e) {
          if (e.key === 'ArrowRight' || e.key === ' ') {
            e.preventDefault();
            goNext();
          } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            goPrev();
          }
        }
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [goNext, goPrev]);

      // Clear exiting slide after transition ends
      useEffect(() => {
        if (prev === null) return;
        const timer = setTimeout(() => setPrev(null), 500);
        return () => clearTimeout(timer);
      }, [prev]);

      const progress = ((current + 1) / total) * 100;

      return (
        <div style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden' }}>
          {/* Slides */}
          <div style={{ position: 'relative', width: '100%', height: '100%' }}>
            {slides.map((slide, i) => {
              const isActive = i === current;
              const isPrev = i === prev;
              if (!isActive && !isPrev) return null;

              let state = 'hidden';
              if (isActive) state = 'active';
              else if (isPrev && direction === 'right') state = 'exit-left';
              else if (isPrev && direction === 'left') state = 'exit-right';

              return (
                <Slide
                  key={i}
                  data={slide}
                  index={i}
                  total={total}
                  state={state}
                />
              );
            })}
          </div>

          {/* Navigation */}
          <nav className="nav" aria-label="Slide navigation">
            <div className="nav-buttons">
              <button
                className="nav-btn"
                onClick={goPrev}
                disabled={current === 0}
                aria-label="이전 슬라이드"
              >
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M10 3L5 8L10 13" />
                </svg>
              </button>
              <button
                className="nav-btn"
                onClick={goNext}
                disabled={current === total - 1}
                aria-label="다음 슬라이드"
              >
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M6 3L11 8L6 13" />
                </svg>
              </button>
            </div>
            <div className="nav-hint">&larr; &rarr; 키로 이동</div>
          </nav>

          {/* Progress bar */}
          <div className="progress-bar" role="progressbar" aria-valuenow={current + 1} aria-valuemin={1} aria-valuemax={total}>
            <div className="progress-fill" style={{ width: progress + '%' }} />
          </div>
        </div>
      );
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
