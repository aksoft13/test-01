<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>날씨 앱 | OpenWeatherMap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root {
      min-height: 100vh;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans KR", sans-serif;
    }
    .bg-gradient-animated {
      background-size: 200% 200%;
      animation: gradientShift 15s ease infinite;
      transition: background 1s ease;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }
    .glass-dark {
      background: rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid #ffffff;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .fade-in {
      animation: fadeIn 0.6s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Scrollbar styling for horizontal forecast */
    .forecast-scroll::-webkit-scrollbar {
      height: 6px;
    }
    .forecast-scroll::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
    }
    .forecast-scroll::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.4);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    // ========================================
    // Config
    // ========================================
    const API_KEY = '1d5926b624ef458b103acdefc47d5cbc';
    const CURRENT_URL = 'https://api.openweathermap.org/data/2.5/weather';
    const FORECAST_URL = 'https://api.openweathermap.org/data/2.5/forecast';
    const GEO_URL = 'https://api.openweathermap.org/geo/1.0/direct';
    const ICON_URL = (icon) => `https://openweathermap.org/img/wn/${icon}@2x.png`;


    // ========================================
    // Background Gradient by Weather
    // ========================================
    const getBackgroundGradient = (main) => {
      const key = (main || '').toLowerCase();
      if (key === 'clear') {
        return 'linear-gradient(135deg, #56CCF2 0%, #2F80ED 40%, #F2994A 100%)';
      }
      if (key === 'clouds') {
        return 'linear-gradient(135deg, #757F9A 0%, #3A6073 50%, #4A90E2 100%)';
      }
      if (key === 'rain' || key === 'drizzle' || key === 'thunderstorm') {
        return 'linear-gradient(135deg, #0F2027 0%, #203A43 50%, #2C5364 100%)';
      }
      if (key === 'snow') {
        return 'linear-gradient(135deg, #E6DADA 0%, #C9D6FF 50%, #74b9ff 100%)';
      }
      // mist, haze, fog, smoke, etc.
      return 'linear-gradient(135deg, #2980B9 0%, #2C5364 50%, #203A43 100%)';
    };

    // ========================================
    // Utilities
    // ========================================
    const formatDate = (timestamp) => {
      const d = new Date(timestamp * 1000);
      const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
      return `${months[d.getMonth()]} ${d.getDate()}일`;
    };

    const formatWeekday = (timestamp) => {
      const d = new Date(timestamp * 1000);
      const weekdays = ['일','월','화','수','목','금','토'];
      return `${weekdays[d.getDay()]}요일`;
    };

    const formatTime = (timestamp, tzOffset = 0) => {
      const d = new Date((timestamp + tzOffset) * 1000);
      const h = d.getUTCHours();
      const m = d.getUTCMinutes();
      const ampm = h >= 12 ? '오후' : '오전';
      const hh = ((h + 11) % 12) + 1;
      return `${ampm} ${hh}:${String(m).padStart(2, '0')}`;
    };

    // Group 3-hour forecast entries into daily summaries
    const groupForecastByDay = (list) => {
      const days = {};
      list.forEach((item) => {
        const date = new Date(item.dt * 1000);
        const key = `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
        if (!days[key]) {
          days[key] = {
            dt: item.dt,
            temps: [],
            items: [],
          };
        }
        days[key].temps.push(item.main.temp);
        days[key].items.push(item);
      });

      return Object.values(days).map((day) => {
        const temps = day.temps;
        const max = Math.max(...temps);
        const min = Math.min(...temps);
        // Prefer the noon (12:00) entry as the representative; fallback to middle item
        let rep = day.items.find((it) => {
          const h = new Date(it.dt * 1000).getHours();
          return h === 12 || h === 13 || h === 15;
        });
        if (!rep) rep = day.items[Math.floor(day.items.length / 2)];
        return {
          dt: rep.dt,
          max,
          min,
          weather: rep.weather[0],
          main: rep.main,
        };
      }).slice(0, 5);
    };

    // ========================================
    // Design System Components
    // ========================================
    const Button = ({ children, onClick, type = 'button', variant = 'primary', className = '', disabled = false }) => {
      const base = 'px-5 py-3 rounded-xl font-semibold transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-white/25 hover:bg-white/35 text-white border border-white/30 backdrop-blur-md',
        ghost: 'bg-transparent hover:bg-white/10 text-white',
      };
      return (
        <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    };

    const Input = ({ value, onChange, onKeyDown, placeholder, className = '' }) => (
      <input
        type="text"
        value={value}
        onChange={onChange}
        onKeyDown={onKeyDown}
        placeholder={placeholder}
        className={`w-full px-5 py-3 rounded-xl bg-white/20 backdrop-blur-md border border-white/30 text-white placeholder-white/70 focus:outline-none focus:ring-2 focus:ring-white/50 transition-all ${className}`}
      />
    );

    const Card = ({ children, className = '' }) => (
      <div className={`glass rounded-3xl shadow-2xl p-6 md:p-8 ${className}`}>{children}</div>
    );

    const Spinner = () => (
      <div className="flex flex-col items-center justify-center py-16">
        <div className="spinner"></div>
        <p className="mt-4 text-white/90 font-medium">불러오는 중...</p>
      </div>
    );

    const ErrorMessage = ({ message }) => (
      <div className="glass rounded-2xl p-6 text-center fade-in">
        <div className="text-5xl mb-3">😕</div>
        <p className="text-white font-semibold text-lg">{message}</p>
        <p className="text-white/70 text-sm mt-2">다른 도시를 검색해보세요.</p>
      </div>
    );

    // ========================================
    // Common Components
    // ========================================
    const SearchBar = ({ onSearch }) => {
      const [query, setQuery] = useState('');

      const handleSubmit = () => {
        if (query.trim()) {
          onSearch(query.trim());
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') handleSubmit();
      };

      return (
        <div className="flex gap-3 w-full max-w-2xl mx-auto">
          <Input
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            onKeyDown={handleKeyDown}
            placeholder="도시 이름 입력 (예: Seoul, 서울, Tokyo)"
          />
          <Button onClick={handleSubmit} className="shrink-0">
            검색
          </Button>
        </div>
      );
    };

    const COUNTRY_NAMES = {
      KR: '대한민국', US: '미국', JP: '일본', CN: '중국', GB: '영국',
      FR: '프랑스', DE: '독일', IT: '이탈리아', ES: '스페인', AU: '호주',
      CA: '캐나다', BR: '브라질', IN: '인도', RU: '러시아', MX: '멕시코',
      TH: '태국', VN: '베트남', SG: '싱가포르', PH: '필리핀', ID: '인도네시아',
    };

    const CitySelector = ({ suggestions, onSelect, onClose }) => (
      <div className="w-full max-w-2xl mx-auto mt-3 fade-in">
        <div className="glass rounded-2xl overflow-hidden shadow-2xl">
          <div className="flex items-center justify-between px-5 py-3 border-b border-white/20">
            <p className="text-white font-semibold text-sm">
              🔍 {suggestions.length}개의 도시가 검색됐습니다. 선택해주세요.
            </p>
            <button onClick={onClose} className="text-white/60 hover:text-white text-lg leading-none">✕</button>
          </div>
          {suggestions.map((city, i) => {
            const koName = city.local_names?.ko || city.name;
            const countryKo = COUNTRY_NAMES[city.country] || city.country;
            const subtitle = [city.state, countryKo].filter(Boolean).join(', ');
            return (
              <button
                key={i}
                onClick={() => onSelect(city)}
                className="w-full flex items-center gap-4 px-5 py-4 hover:bg-white/20 transition-colors text-left border-b border-white/10 last:border-0"
              >
                <div className="text-2xl">📍</div>
                <div>
                  <p className="text-white font-bold">{koName}</p>
                  <p className="text-white/70 text-sm">{city.name} · {subtitle}</p>
                </div>
              </button>
            );
          })}
        </div>
      </div>
    );

    const WeatherDetailItem = ({ icon, label, value }) => (
      <div className="glass-dark rounded-2xl p-4 flex items-center gap-3">
        <div className="text-3xl">{icon}</div>
        <div className="flex flex-col">
          <span className="text-white/70 text-xs uppercase tracking-wide">{label}</span>
          <span className="text-white font-semibold text-base md:text-lg">{value}</span>
        </div>
      </div>
    );

    // ========================================
    // Page Components
    // ========================================
    const CurrentWeatherCard = ({ data }) => {
      const w = data.weather[0];
      const iconUrl = ICON_URL(w.icon);
      const country = data.sys?.country || '';
      const visibilityKm = data.visibility ? (data.visibility / 1000).toFixed(1) : '-';

      return (
        <Card className="fade-in">
          <div className="flex flex-col items-center text-white">
            <div className="flex items-center gap-2 mb-1">
              <h2 className="text-3xl md:text-4xl font-bold tracking-tight">{data.name}</h2>
              {country && (
                <span className="px-2 py-1 bg-white/20 rounded-md text-xs font-semibold">{country}</span>
              )}
            </div>
            <p className="text-white/80 text-sm mb-4">
              {formatDate(data.dt)} · {formatTime(data.dt, data.timezone)}
            </p>

            <img src={iconUrl} alt={w.description} className="w-36 h-36 md:w-44 md:h-44 drop-shadow-2xl" />

            <p className="text-xl md:text-2xl capitalize mb-2 font-medium">{w.description}</p>

            <div className="flex items-end gap-2">
              <span className="text-7xl md:text-8xl font-extrabold leading-none">
                {Math.round(data.main.temp)}
              </span>
              <span className="text-4xl font-bold mb-2">°C</span>
            </div>

            <p className="text-white/80 mt-2">
              체감 온도 <span className="font-semibold text-white">{Math.round(data.main.feels_like)}°C</span>
            </p>

            <div className="flex items-center gap-4 mt-2">
              <div className="flex items-center gap-1 text-red-200">
                <span className="text-sm">최고</span>
                <span className="font-bold">{Math.round(data.main.temp_max)}°</span>
              </div>
              <div className="w-px h-4 bg-white/30"></div>
              <div className="flex items-center gap-1 text-blue-200">
                <span className="text-sm">최저</span>
                <span className="font-bold">{Math.round(data.main.temp_min)}°</span>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-8">
            <WeatherDetailItem icon="💧" label="습도" value={`${data.main.humidity}%`} />
            <WeatherDetailItem icon="💨" label="풍속" value={`${data.wind.speed} m/s`} />
            <WeatherDetailItem icon="👁️" label="가시거리" value={`${visibilityKm} km`} />
            <WeatherDetailItem icon="🌡️" label="기압" value={`${data.main.pressure} hPa`} />
          </div>
        </Card>
      );
    };

    const ForecastCard = ({ day }) => {
      const iconUrl = ICON_URL(day.weather.icon);
      return (
        <div className="glass rounded-2xl p-4 flex flex-col items-center text-white min-w-[140px] flex-1 hover:bg-white/25 transition-all">
          <p className="font-semibold text-sm">{formatWeekday(day.dt)}</p>
          <p className="text-white/70 text-xs mb-1">{formatDate(day.dt)}</p>
          <img src={iconUrl} alt={day.weather.description} className="w-20 h-20 my-1" />
          <p className="text-xs capitalize text-white/80 mb-2 text-center min-h-[32px]">
            {day.weather.description}
          </p>
          <div className="flex items-center gap-2">
            <span className="font-bold text-red-200">{Math.round(day.max)}°</span>
            <span className="text-white/50">/</span>
            <span className="font-bold text-blue-200">{Math.round(day.min)}°</span>
          </div>
        </div>
      );
    };

    const ForecastSection = ({ forecastList }) => {
      const days = useMemo(() => groupForecastByDay(forecastList), [forecastList]);

      return (
        <Card className="fade-in">
          <h3 className="text-white text-xl md:text-2xl font-bold mb-4 flex items-center gap-2">
            <span>📅</span> 5일 예보
          </h3>
          <div className="forecast-scroll flex gap-3 overflow-x-auto pb-2">
            {days.map((day) => (
              <ForecastCard key={day.dt} day={day} />
            ))}
          </div>
        </Card>
      );
    };

    // ========================================
    // App Component
    // ========================================
    const App = () => {
      const [current, setCurrent] = useState(null);
      const [forecast, setForecast] = useState(null);
      const [loading, setLoading] = useState(true);
      const [searching, setSearching] = useState(false);
      const [error, setError] = useState(null);
      const [suggestions, setSuggestions] = useState(null); // null = 비활성, [] = 검색중/결과없음

      const fetchWeatherByCoords = useCallback(async (lat, lon) => {
        setLoading(true);
        setError(null);
        setSuggestions(null);
        try {
          const [currentRes, forecastRes] = await Promise.all([
            fetch(`${CURRENT_URL}?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=kr`),
            fetch(`${FORECAST_URL}?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=kr`),
          ]);
          if (!currentRes.ok) throw new Error('날씨 정보를 불러오지 못했습니다.');
          if (!forecastRes.ok) throw new Error('예보 정보를 불러오지 못했습니다.');
          const [currentData, forecastData] = await Promise.all([currentRes.json(), forecastRes.json()]);
          setCurrent(currentData);
          setForecast(forecastData);
        } catch (err) {
          setError(err.message || '알 수 없는 오류가 발생했습니다.');
          setCurrent(null);
          setForecast(null);
        } finally {
          setLoading(false);
        }
      }, []);

      const handleSearch = useCallback(async (query) => {
        setError(null);
        setSuggestions(null);
        setSearching(true);
        try {
          const geoRes = await fetch(
            `${GEO_URL}?q=${encodeURIComponent(query)}&limit=5&appid=${API_KEY}`
          );
          const geoData = await geoRes.json();

          if (!geoData || geoData.length === 0) {
            setError(`"${query}" 도시를 찾을 수 없습니다.`);
            return;
          }

          // 항상 후보 목록 표시 (1개여도 선택하게)
          setSuggestions(geoData);
        } catch (err) {
          setError('검색 중 오류가 발생했습니다.');
        } finally {
          setSearching(false);
        }
      }, [fetchWeatherByCoords]);

      const handleCitySelect = useCallback((city) => {
        fetchWeatherByCoords(city.lat, city.lon);
      }, [fetchWeatherByCoords]);

      // 초기 로드: Seoul
      useEffect(() => {
        fetchWeatherByCoords(37.5665, 126.978);
      }, []);

      const bgStyle = { background: getBackgroundGradient(current?.weather?.[0]?.main) };

      return (
        <div className="min-h-screen bg-gradient-animated transition-all duration-700" style={bgStyle}>
          <div className="min-h-screen bg-black/10">
            <div className="max-w-5xl mx-auto px-4 py-8 md:py-12">
              <header className="text-center mb-8">
                <h1 className="text-3xl md:text-5xl font-extrabold text-white drop-shadow-lg tracking-tight">
                  🌤️ Weather App
                </h1>
                <p className="text-white/80 mt-2 text-sm md:text-base">
                  OpenWeatherMap 기반 실시간 날씨 & 예보
                </p>
              </header>

              <div className="mb-2">
                <SearchBar onSearch={handleSearch} />
              </div>

              {searching && (
                <div className="flex justify-center mt-4">
                  <div className="flex items-center gap-2 text-white/80 text-sm">
                    <div className="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></div>
                    도시 검색 중...
                  </div>
                </div>
              )}

              {suggestions && suggestions.length > 0 && (
                <CitySelector
                  suggestions={suggestions}
                  onSelect={handleCitySelect}
                  onClose={() => setSuggestions(null)}
                />
              )}

              <div className="mt-6">
                {loading && <Spinner />}

                {!loading && error && (
                  <div className="max-w-2xl mx-auto">
                    <ErrorMessage message={error} />
                  </div>
                )}

                {!loading && !error && current && forecast && (
                  <div className="space-y-6">
                    <CurrentWeatherCard data={current} />
                    <ForecastSection forecastList={forecast.list} />
                  </div>
                )}
              </div>

              <footer className="text-center text-white/60 text-xs mt-10">
                Powered by OpenWeatherMap · {new Date().getFullYear()}
              </footer>
            </div>
          </div>
        </div>
      );
    };

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
