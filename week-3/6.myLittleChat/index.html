<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Little Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Custom scrollbar for chat list and messages */
    .scrollbar-thin::-webkit-scrollbar {
      width: 6px;
    }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: transparent;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background-color: rgba(156, 163, 175, 0.5);
      border-radius: 3px;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover {
      background-color: rgba(107, 114, 128, 0.7);
    }

    /* Message fade-in animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-fadeInUp {
      animation: fadeInUp 0.25s ease-out;
    }

    /* Typing indicator dots */
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
    .typing-dot {
      animation: blink 1.4s infinite both;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    /* Pretendard-like font fallback */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Pretendard", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ========================================
    // Mock Data Generators
    // ========================================
    const RANDOM_NAMES = [
      "김민준", "이서연", "박지후", "최하윤", "정우진",
      "한소율", "오태호", "윤지아", "장은서", "송시우",
      "Alex Kim", "Sophia Lee", "James Park", "Olivia Choi", "Ethan Jung"
    ];

    const AVATAR_COLORS = [
      "bg-red-400", "bg-orange-400", "bg-amber-400", "bg-lime-400",
      "bg-emerald-400", "bg-teal-400", "bg-cyan-400", "bg-sky-400",
      "bg-indigo-400", "bg-purple-400", "bg-pink-400", "bg-rose-400"
    ];

    const SAMPLE_MESSAGES = [
      "안녕! 오늘 뭐해?",
      "방금 점심 먹었어 🍜",
      "ㅋㅋㅋㅋ 진짜?",
      "오늘 날씨 완전 좋다",
      "주말에 시간 괜찮아?",
      "영화 보러 갈래?",
      "I'll check it out later!",
      "내일 회의 몇 시였지?",
      "Got it, thanks 🙏",
      "커피 한 잔 할래?",
      "방금 집 도착했어",
      "그거 진짜 맛있더라",
      "오늘도 수고했어~",
      "Let me know when you're free",
      "헐 대박 ㅠㅠ",
      "나도 그렇게 생각해",
      "잠깐 통화 가능해?",
      "사진 보낼게 📸",
      "고마워 정말!",
      "ㅇㅋㅇㅋ 이따 봐~"
    ];

    const LAST_MESSAGE_PREVIEW = [
      "오늘 약속 장소 어디야?",
      "ㅋㅋㅋㅋㅋㅋ",
      "방금 도착했어!",
      "사진 확인해봐",
      "내일 보자",
      "Thanks a lot",
      "지금 가는 중",
      "확인했어요",
      "나중에 연락해",
      "좋은 하루 보내"
    ];

    // Pick N random distinct items from an array
    function pickRandom(arr, count) {
      const shuffled = [...arr].sort(() => 0.5 - Math.random());
      return shuffled.slice(0, count);
    }

    // Generate a random timestamp within last 24 hours
    function randomRecentTime() {
      const now = new Date();
      const minutesAgo = Math.floor(Math.random() * 60 * 24);
      return new Date(now.getTime() - minutesAgo * 60 * 1000);
    }

    // Format time like "오후 2:35" or "어제" / weekday if older
    function formatTime(date) {
      const now = new Date();
      const diffMs = now - date;
      const diffMinutes = Math.floor(diffMs / (1000 * 60));
      const diffHours = Math.floor(diffMs / (1000 * 60 * 60));

      if (diffMinutes < 1) return "방금";
      if (diffMinutes < 60) return `${diffMinutes}분 전`;
      if (diffHours < 24) {
        const hour = date.getHours();
        const min = date.getMinutes().toString().padStart(2, "0");
        const period = hour >= 12 ? "오후" : "오전";
        const displayHour = hour % 12 === 0 ? 12 : hour % 12;
        return `${period} ${displayHour}:${min}`;
      }
      if (diffHours < 48) return "어제";
      const days = ["일", "월", "화", "수", "목", "금", "토"];
      return days[date.getDay()] + "요일";
    }

    // Format exact time for message bubbles
    function formatBubbleTime(date) {
      const hour = date.getHours();
      const min = date.getMinutes().toString().padStart(2, "0");
      const period = hour >= 12 ? "오후" : "오전";
      const displayHour = hour % 12 === 0 ? 12 : hour % 12;
      return `${period} ${displayHour}:${min}`;
    }

    // Build a random conversation for a given chat
    function generateConversation(count = 8) {
      const messages = [];
      let baseTime = new Date().getTime() - count * 3 * 60 * 1000;
      for (let i = 0; i < count; i++) {
        baseTime += Math.floor(Math.random() * 5 + 1) * 60 * 1000;
        messages.push({
          id: `m-${Math.random().toString(36).slice(2, 9)}`,
          sender: Math.random() > 0.5 ? "me" : "other",
          text: SAMPLE_MESSAGES[Math.floor(Math.random() * SAMPLE_MESSAGES.length)],
          time: new Date(baseTime)
        });
      }
      return messages;
    }

    // Build initial chat rooms
    function generateChats(count = 8) {
      const names = pickRandom(RANDOM_NAMES, count);
      return names.map((name, idx) => ({
        id: `chat-${idx}`,
        name,
        avatarColor: AVATAR_COLORS[idx % AVATAR_COLORS.length],
        initial: name.charAt(0),
        online: Math.random() > 0.4,
        lastMessage: LAST_MESSAGE_PREVIEW[Math.floor(Math.random() * LAST_MESSAGE_PREVIEW.length)],
        lastTime: randomRecentTime(),
        unread: Math.random() > 0.55 ? Math.floor(Math.random() * 9) + 1 : 0,
        messages: generateConversation(6 + Math.floor(Math.random() * 6))
      }));
    }

    // ========================================
    // Design System Components
    // ========================================

    // Avatar with colored circle + initial + optional online dot
    function Avatar({ color = "bg-gray-400", initial = "?", online, size = "md", className = "" }) {
      const sizeMap = {
        sm: "w-8 h-8 text-sm",
        md: "w-12 h-12 text-base",
        lg: "w-14 h-14 text-lg"
      };
      const dotSize = size === "sm" ? "w-2 h-2" : "w-3 h-3";
      return (
        <div className={`relative inline-block ${className}`}>
          <div
            className={`${sizeMap[size]} ${color} rounded-full flex items-center justify-center text-white font-semibold shadow-sm`}
            aria-label={`${initial} avatar`}
          >
            {initial}
          </div>
          {online !== undefined && (
            <span
              className={`absolute bottom-0 right-0 ${dotSize} rounded-full border-2 border-white ${
                online ? "bg-green-500" : "bg-gray-400"
              }`}
              aria-label={online ? "online" : "offline"}
            />
          )}
        </div>
      );
    }

    // Unread count badge
    function Badge({ count, className = "" }) {
      if (!count || count <= 0) return null;
      return (
        <span
          className={`inline-flex items-center justify-center min-w-[20px] h-5 px-1.5 text-xs font-bold text-white bg-red-500 rounded-full ${className}`}
        >
          {count > 99 ? "99+" : count}
        </span>
      );
    }

    // Generic button
    function Button({
      children,
      onClick,
      variant = "primary",
      size = "md",
      disabled,
      type = "button",
      className = "",
      ariaLabel
    }) {
      const base = "inline-flex items-center justify-center font-medium rounded-full transition-all focus:outline-none focus:ring-2 focus:ring-offset-1";
      const variants = {
        primary: "bg-indigo-500 text-white hover:bg-indigo-600 focus:ring-indigo-400 disabled:bg-indigo-300",
        secondary: "bg-gray-200 text-gray-800 hover:bg-gray-300 focus:ring-gray-400 disabled:opacity-50",
        ghost: "bg-transparent text-gray-600 hover:bg-gray-100 focus:ring-gray-300"
      };
      const sizes = {
        sm: "px-3 py-1 text-sm",
        md: "px-4 py-2 text-sm",
        lg: "px-5 py-3 text-base",
        icon: "w-10 h-10"
      };
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          aria-label={ariaLabel}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    // Text input
    function Input({ value, onChange, onKeyDown, placeholder, className = "", ariaLabel }) {
      return (
        <input
          type="text"
          value={value}
          onChange={onChange}
          onKeyDown={onKeyDown}
          placeholder={placeholder}
          aria-label={ariaLabel}
          className={`w-full px-4 py-3 bg-gray-100 rounded-full text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:bg-white transition-all ${className}`}
        />
      );
    }

    // ========================================
    // Chat Components
    // ========================================

    // Single chat item in sidebar
    function ChatListItem({ chat, isActive, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`w-full flex items-center gap-3 px-4 py-3 text-left transition-colors border-l-4 ${
            isActive
              ? "bg-indigo-50 border-indigo-500"
              : "border-transparent hover:bg-gray-50"
          }`}
        >
          <Avatar
            color={chat.avatarColor}
            initial={chat.initial}
            online={chat.online}
            size="md"
          />
          <div className="flex-1 min-w-0">
            <div className="flex items-center justify-between gap-2">
              <h3 className="font-semibold text-gray-900 truncate">{chat.name}</h3>
              <span className="text-xs text-gray-400 flex-shrink-0">
                {formatTime(chat.lastTime)}
              </span>
            </div>
            <div className="flex items-center justify-between gap-2 mt-0.5">
              <p className="text-sm text-gray-500 truncate">{chat.lastMessage}</p>
              <Badge count={chat.unread} />
            </div>
          </div>
        </button>
      );
    }

    // Sidebar with search + chat list
    function Sidebar({ chats, activeId, onSelect, onClose, isMobileOpen }) {
      const [query, setQuery] = useState("");

      const filtered = useMemo(() => {
        if (!query.trim()) return chats;
        const q = query.toLowerCase();
        return chats.filter(
          (c) =>
            c.name.toLowerCase().includes(q) ||
            c.lastMessage.toLowerCase().includes(q)
        );
      }, [chats, query]);

      const totalUnread = useMemo(
        () => chats.reduce((sum, c) => sum + c.unread, 0),
        [chats]
      );

      return (
        <aside
          className={`${
            isMobileOpen ? "flex" : "hidden"
          } md:flex flex-col w-full md:w-80 lg:w-96 bg-white border-r border-gray-200 h-full absolute md:relative z-20`}
        >
          {/* Header */}
          <div className="px-5 py-4 border-b border-gray-100">
            <div className="flex items-center justify-between mb-3">
              <h1 className="text-xl font-bold text-gray-900">
                내 채팅
                {totalUnread > 0 && (
                  <span className="ml-2 text-sm font-normal text-indigo-500">
                    {totalUnread}
                  </span>
                )}
              </h1>
              <button
                onClick={onClose}
                className="md:hidden p-2 text-gray-500 hover:bg-gray-100 rounded-full"
                aria-label="Close sidebar"
              >
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
            <Input
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              placeholder="이름 또는 메시지 검색..."
              ariaLabel="Search chats"
            />
          </div>

          {/* Chat list */}
          <div className="flex-1 overflow-y-auto scrollbar-thin">
            {filtered.length === 0 ? (
              <div className="p-8 text-center text-gray-400 text-sm">
                검색 결과가 없습니다
              </div>
            ) : (
              filtered.map((chat) => (
                <ChatListItem
                  key={chat.id}
                  chat={chat}
                  isActive={chat.id === activeId}
                  onClick={() => onSelect(chat.id)}
                />
              ))
            )}
          </div>

          {/* Footer / profile */}
          <div className="px-5 py-3 border-t border-gray-100 flex items-center gap-3 bg-gray-50">
            <Avatar color="bg-indigo-500" initial="나" size="sm" online={true} />
            <div className="flex-1 min-w-0">
              <p className="text-sm font-semibold text-gray-800">내 프로필</p>
              <p className="text-xs text-gray-500">온라인</p>
            </div>
            <button
              className="p-2 text-gray-500 hover:bg-gray-200 rounded-full transition-colors"
              aria-label="Settings"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </button>
          </div>
        </aside>
      );
    }

    // Individual message bubble
    function MessageBubble({ message, showAvatar, chat }) {
      const isMe = message.sender === "me";
      return (
        <div className={`flex items-end gap-2 animate-fadeInUp ${isMe ? "justify-end" : "justify-start"}`}>
          {!isMe && (
            <div className="w-8 flex-shrink-0">
              {showAvatar && (
                <Avatar
                  color={chat.avatarColor}
                  initial={chat.initial}
                  size="sm"
                />
              )}
            </div>
          )}
          <div className={`flex flex-col max-w-[75%] sm:max-w-[65%] ${isMe ? "items-end" : "items-start"}`}>
            {!isMe && showAvatar && (
              <span className="text-xs text-gray-500 mb-1 ml-1">{chat.name}</span>
            )}
            <div className={`flex items-end gap-1.5 ${isMe ? "flex-row-reverse" : "flex-row"}`}>
              <div
                className={`px-4 py-2.5 rounded-2xl break-words shadow-sm ${
                  isMe
                    ? "bg-indigo-500 text-white rounded-br-md"
                    : "bg-white text-gray-800 rounded-bl-md border border-gray-100"
                }`}
              >
                <p className="text-sm leading-relaxed whitespace-pre-wrap">{message.text}</p>
              </div>
              <span className="text-[10px] text-gray-400 mb-0.5 flex-shrink-0">
                {formatBubbleTime(message.time)}
              </span>
            </div>
          </div>
        </div>
      );
    }

    // Typing indicator bubble
    function TypingIndicator({ chat }) {
      return (
        <div className="flex items-end gap-2 animate-fadeInUp">
          <Avatar color={chat.avatarColor} initial={chat.initial} size="sm" />
          <div className="px-4 py-3 bg-white rounded-2xl rounded-bl-md border border-gray-100 shadow-sm">
            <div className="flex gap-1">
              <span className="typing-dot w-2 h-2 bg-gray-400 rounded-full"></span>
              <span className="typing-dot w-2 h-2 bg-gray-400 rounded-full"></span>
              <span className="typing-dot w-2 h-2 bg-gray-400 rounded-full"></span>
            </div>
          </div>
        </div>
      );
    }

    // Chat header with active user info
    function ChatHeader({ chat, onOpenSidebar }) {
      return (
        <header className="flex items-center gap-3 px-4 md:px-6 py-3 bg-white border-b border-gray-200">
          <button
            onClick={onOpenSidebar}
            className="md:hidden p-2 text-gray-600 hover:bg-gray-100 rounded-full"
            aria-label="Open chat list"
          >
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <Avatar
            color={chat.avatarColor}
            initial={chat.initial}
            online={chat.online}
            size="md"
          />
          <div className="flex-1 min-w-0">
            <h2 className="font-semibold text-gray-900 truncate">{chat.name}</h2>
            <p className="text-xs text-gray-500">
              {chat.online ? (
                <span className="text-green-600">● 온라인</span>
              ) : (
                <span>오프라인</span>
              )}
            </p>
          </div>
          <div className="flex items-center gap-1">
            <button
              className="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors"
              aria-label="Voice call"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
              </svg>
            </button>
            <button
              className="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors"
              aria-label="Video call"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
              </svg>
            </button>
            <button
              className="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors"
              aria-label="More options"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
              </svg>
            </button>
          </div>
        </header>
      );
    }

    // Scrollable messages list
    function MessageList({ chat, isTyping }) {
      const scrollRef = useRef(null);

      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [chat.messages.length, isTyping, chat.id]);

      return (
        <div
          ref={scrollRef}
          className="flex-1 overflow-y-auto scrollbar-thin px-4 md:px-6 py-4 space-y-3 bg-gray-50"
        >
          {chat.messages.map((msg, idx) => {
            const prev = chat.messages[idx - 1];
            const showAvatar =
              msg.sender === "other" && (!prev || prev.sender !== "other");
            return (
              <MessageBubble
                key={msg.id}
                message={msg}
                showAvatar={showAvatar}
                chat={chat}
              />
            );
          })}
          {isTyping && <TypingIndicator chat={chat} />}
        </div>
      );
    }

    // Message input composer
    function MessageComposer({ onSend }) {
      const [text, setText] = useState("");
      const inputRef = useRef(null);

      const handleSend = () => {
        const trimmed = text.trim();
        if (!trimmed) return;
        onSend(trimmed);
        setText("");
        if (inputRef.current) inputRef.current.focus();
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      };

      return (
        <div className="px-4 md:px-6 py-3 bg-white border-t border-gray-200">
          <div className="flex items-center gap-2">
            <button
              className="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors flex-shrink-0"
              aria-label="Attach file"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
              </svg>
            </button>
            <input
              ref={inputRef}
              type="text"
              value={text}
              onChange={(e) => setText(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="메시지를 입력하세요..."
              aria-label="Message input"
              className="flex-1 px-4 py-2.5 bg-gray-100 rounded-full text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:bg-white transition-all"
            />
            <button
              className="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors flex-shrink-0"
              aria-label="Emoji"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </button>
            <button
              onClick={handleSend}
              disabled={!text.trim()}
              className={`flex-shrink-0 w-11 h-11 flex items-center justify-center rounded-full transition-all ${
                text.trim()
                  ? "bg-indigo-500 text-white hover:bg-indigo-600 shadow-md"
                  : "bg-gray-200 text-gray-400 cursor-not-allowed"
              }`}
              aria-label="Send message"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
              </svg>
            </button>
          </div>
          <p className="text-[10px] text-gray-400 mt-1.5 ml-12">
            Enter로 전송 · Shift+Enter로 줄바꿈
          </p>
        </div>
      );
    }

    // Empty state when nothing is selected
    function EmptyChatState() {
      return (
        <div className="flex-1 flex flex-col items-center justify-center bg-gray-50 p-8">
          <div className="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mb-4">
            <svg className="w-10 h-10 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
            </svg>
          </div>
          <h2 className="text-lg font-semibold text-gray-700 mb-1">채팅을 선택하세요</h2>
          <p className="text-sm text-gray-500">왼쪽 목록에서 대화를 시작할 상대를 골라주세요</p>
        </div>
      );
    }

    // ========================================
    // Main Chat View (page-level component)
    // ========================================
    function ChatApp() {
      const [chats, setChats] = useState(() => generateChats(9));
      const [activeId, setActiveId] = useState(() => null);
      const [isTyping, setIsTyping] = useState(false);
      const [isMobileSidebarOpen, setIsMobileSidebarOpen] = useState(false);
      const typingTimeoutRef = useRef(null);

      // Default to first chat on first load
      useEffect(() => {
        setChats((prev) => {
          if (prev.length && !activeId) {
            setActiveId(prev[0].id);
          }
          return prev;
        });
      }, []);

      const activeChat = useMemo(
        () => chats.find((c) => c.id === activeId) || null,
        [chats, activeId]
      );

      // When user selects chat -> clear unread + close mobile sidebar
      const handleSelectChat = useCallback((id) => {
        setActiveId(id);
        setIsMobileSidebarOpen(false);
        setChats((prev) =>
          prev.map((c) => (c.id === id ? { ...c, unread: 0 } : c))
        );
      }, []);

      // Send new message from "me"
      const handleSendMessage = useCallback(
        async (text) => {
          if (!activeId) return;
          const now = new Date();
          const newMessage = {
            id: `m-${Date.now()}`,
            sender: "me",
            text,
            time: now
          };

          // Snapshot history before appending new message
          const current = chats.find((c) => c.id === activeId);
          const priorHistory = (current?.messages || [])
            .slice(-10)
            .map((m) => ({
              role: m.sender === "me" ? "user" : "assistant",
              content: m.text
            }));

          setChats((prev) =>
            prev.map((c) =>
              c.id === activeId
                ? {
                    ...c,
                    messages: [...c.messages, newMessage],
                    lastMessage: text,
                    lastTime: now
                  }
                : c
            )
          );

          // Call AI API for real reply
          setIsTyping(true);
          if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
          try {
            const res = await fetch("/api/chat", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ message: text, history: priorHistory })
            });
            const data = await res.json();
            const reply = data.reply || "어... 답장이 비었어 ㅎㅎ";
            const replyTime = new Date();
            const replyMessage = {
              id: `m-${Date.now()}-r`,
              sender: "other",
              text: reply,
              time: replyTime
            };
            setChats((prev) =>
              prev.map((c) =>
                c.id === activeId
                  ? {
                      ...c,
                      messages: [...c.messages, replyMessage],
                      lastMessage: reply,
                      lastTime: replyTime
                    }
                  : c
              )
            );
          } catch (err) {
            console.error(err);
            const replyTime = new Date();
            const errorMessage = {
              id: `m-${Date.now()}-e`,
              sender: "other",
              text: "앗, 지금 답장을 못 보내겠어 ㅠㅠ 잠시 후 다시 시도해줘!",
              time: replyTime
            };
            setChats((prev) =>
              prev.map((c) =>
                c.id === activeId
                  ? {
                      ...c,
                      messages: [...c.messages, errorMessage],
                      lastMessage: errorMessage.text,
                      lastTime: replyTime
                    }
                  : c
              )
            );
          } finally {
            setIsTyping(false);
          }
        },
        [activeId, chats]
      );

      // Cleanup pending typing timeout
      useEffect(() => {
        return () => {
          if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
        };
      }, []);

      return (
        <div className="h-screen w-screen flex items-center justify-center bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 p-0 md:p-6">
          <div className="w-full h-full md:max-w-6xl md:h-[90vh] md:rounded-2xl overflow-hidden shadow-2xl flex bg-white relative">
            <Sidebar
              chats={chats}
              activeId={activeId}
              onSelect={handleSelectChat}
              onClose={() => setIsMobileSidebarOpen(false)}
              isMobileOpen={isMobileSidebarOpen}
            />

            <main className="flex-1 flex flex-col min-w-0">
              {activeChat ? (
                <>
                  <ChatHeader
                    chat={activeChat}
                    onOpenSidebar={() => setIsMobileSidebarOpen(true)}
                  />
                  <MessageList chat={activeChat} isTyping={isTyping} />
                  <MessageComposer onSend={handleSendMessage} />
                </>
              ) : (
                <>
                  <div className="md:hidden flex items-center px-4 py-3 border-b border-gray-200 bg-white">
                    <button
                      onClick={() => setIsMobileSidebarOpen(true)}
                      className="p-2 text-gray-600 hover:bg-gray-100 rounded-full"
                      aria-label="Open chat list"
                    >
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16" />
                      </svg>
                    </button>
                    <h2 className="ml-2 font-semibold text-gray-800">My Little Chat</h2>
                  </div>
                  <EmptyChatState />
                </>
              )}
            </main>
          </div>
        </div>
      );
    }

    // ========================================
    // App Root
    // ========================================
    function App() {
      return <ChatApp />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
